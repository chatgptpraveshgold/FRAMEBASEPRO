/* ╔══════════════════════════════════════════════════════╗
   ║   FRAMEBASE PRO — PREMIUM MOBILE DESIGN SYSTEM        ║
   ║   Obsidian / Glassmorphism / Neon Accents             ║
   ╚══════════════════════════════════════════════════════╝ */

:root {
  /* Core Palette */
  --bg-void: #050508;
  --bg-base: #0A0A10;
  --bg-card: rgba(20, 20, 32, 0.6);
  --bg-glass: rgba(12, 12, 22, 0.7);
  --bg-glass-strong: rgba(10, 10, 18, 0.9);

  /* Neon Accents */
  --accent: #A855F7;          /* Purple */
  --accent-blue: #3B82F6;     /* Blue */
  --accent-pink: #EC4899;     /* Pink */
  --accent-gradient: linear-gradient(135deg, #A855F7 0%, #3B82F6 100%);
  --accent-glow: rgba(168, 85, 247, 0.35);
  
  /* Semantic */
  --red: #FF4B4B;    --red-muted: rgba(255, 75, 75, 0.12);
  --green: #00F2A5;  --green-muted: rgba(0, 242, 165, 0.12);
  --amber: #FFD43B;  --amber-muted: rgba(255, 212, 59, 0.12);

  /* Text Colors */
  --text-primary: #FFFFFF;
  --text-secondary: #9FA2B4;
  --text-muted: #5F6174;
  --text-ghost: #3A3C4D;

  /* Layout */
  --safe-top: env(safe-area-inset-top, 20px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
  --nav-h: 74px;
  --header-h: 80px;

  /* Borders & Radius */
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-border-bright: rgba(255, 255, 255, 0.15);
  --r-md: 18px;
  --r-lg: 24px;
  --r-xl: 32px;

  /* Typography */
  --font-display: 'Syne', system-ui, sans-serif;
  --font-base: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; background: var(--bg-void); color: var(--text-primary);
  font-family: var(--font-base); font-size: 14px; -webkit-font-smoothing: antialiased;
  line-height: 1.5; overflow: hidden; position: fixed; width: 100%;
}

#app {
  height: 100dvh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; position: relative;
}

/* Fix iOS Scroll Inertia */
.scroll-container {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: 120px;
}

/* Background Glowing Orbs */
#app::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(circle at top right, rgba(168, 85, 247, 0.1), transparent 40%),
              radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.08), transparent 40%);
  pointer-events: none; z-index: -1;
}

::-webkit-scrollbar { display: none; }
a { color: inherit; text-decoration: none; }
button { font-family: var(--font-base); border: none; background: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }

/* ── APP SHELL COMPONENTS ── */
.mobile-header {
  padding: calc(var(--safe-top) + 12px) 20px 20px;
  background: linear-gradient(to bottom, rgba(168, 85, 247, 0.05), transparent);
  display: flex; align-items: center; justify-content: space-between;
}
.header-profile { display: flex; align-items: center; gap: 12px; }
.avatar-ring {
  width: 44px; height: 44px; border-radius: 14px; padding: 2px;
  background: var(--accent-gradient); box-shadow: 0 4px 12px var(--accent-glow);
}
.h-avatar { width: 100%; height: 100%; border-radius: 12px; border: 2px solid var(--bg-void); display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; background: var(--bg-base); font-size: 16px; }
.h-greeting h2 { font-family: var(--font-display); font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
.h-greeting p { font-size: 12px; color: var(--text-secondary); }
.header-actions { display: flex; gap: 10px; }
.h-btn { width: 44px; height: 44px; border-radius: 14px; background: var(--bg-card); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; color: var(--text-secondary); backdrop-filter: blur(10px); }

/* ── MAIN LAYOUT ── */
.main-area {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  position: relative; z-index: 1;
}

/* ── STATUS FILTER (Horizontal Pills) ── */
.status-scroll {
  padding: 0 16px 16px; display: flex; gap: 8px; overflow-x: auto;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.status-pill {
  padding: 8px 16px; border-radius: 99px; background: var(--bg-card);
  border: 1px solid var(--glass-border); white-space: nowrap;
  font-size: 13px; font-weight: 600; color: var(--text-secondary);
  transition: all 0.2s ease;
}
.status-pill.active {
  background: var(--accent); color: #fff; border-color: var(--accent);
  box-shadow: 0 4px 12px var(--accent-glow);
}

/* ── DASHBOARD INSIGHTS ── */
.dashboard-insights {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px 24px;
}
.insight-box {
  background: var(--bg-glass); border: 1px solid var(--glass-border);
  padding: 12px 8px; border-radius: 20px; text-align: center; backdrop-filter: blur(8px);
}
.insight-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
.insight-count { font-family: var(--font-display); font-size: 20px; font-weight: 800; }

/* ── HERO CARD ── */
.hero-wrap { padding: 0 20px 24px; }
.hero-card {
  position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 28px;
  overflow: hidden; border: 1px solid var(--glass-border-bright);
  background: #000; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.hero-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
.hero-overlay {
  position: absolute; inset: 0; padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%);
  display: flex; flex-direction: column; justify-content: flex-end;
}
.hero-title { font-family: var(--font-display); font-size: 24px; font-weight: 800; margin-bottom: 8px; }
.hero-actions { display: flex; gap: 8px; }
.hero-btn-main {
  flex: 1; padding: 10px; border-radius: 12px; background: #fff; color: #000;
  font-weight: 700; border: none; display: flex; align-items: center; justify-content: center; gap: 6px;
}

/* ── ASSET CARDS (VERTICAL) ── */
.asset-vertical-list {
  display: flex; flex-direction: column; gap: 14px; padding: 0 20px 100px;
}
.asset-hero-card {
  position: relative; width: 100%; border-radius: 28px; overflow: hidden;
  background: var(--bg-card); border: 1px solid var(--glass-border);
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}
.hero-banner {
  width: 100%; aspect-ratio: 16/9; background-size: cover; background-position: center;
  position: relative; background-color: #000;
}
.hero-badge {
  position: absolute; top: 12px; right: 12px; padding: 6px 14px;
  border-radius: 99px; font-size: 10px; font-weight: 800; color: #fff;
  text-transform: uppercase; letter-spacing: 1px; backdrop-filter: blur(10px);
}
.hero-info { padding: 16px 20px; }
.hero-title { font-family: var(--font-display); font-size: 18px; font-weight: 800; margin-bottom: 4px; }
.hero-meta { font-size: 12px; color: var(--text-secondary); }

.asset-card-p {
  background: var(--bg-card); border: 1px solid var(--glass-border);
  border-radius: 22px; padding: 12px; display: flex; align-items: center; gap: 14px;
  backdrop-filter: blur(12px);
}
.card-thumb {
  width: 64px; height: 64px; border-radius: 14px; background: #000;
  background-size: cover; background-position: center; flex-shrink: 0;
}
.card-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 2px; }
.card-meta { font-size: 11px; color: var(--text-secondary); }
.card-right { margin-left: auto; color: var(--text-muted); }

/* ── MODAL & PANELS ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000;
  display: flex; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(8px);
}
.modal {
  background: var(--bg-glass-strong); border-top: 1px solid var(--glass-border-bright);
  border-radius: 32px 32px 0 0; padding: 24px; width: 100%; max-width: 440px;
  max-height: 90dvh; overflow-y: auto; position: relative;
  box-shadow: 0 -20px 40px rgba(0,0,0,0.5);
}
.modal::before {
  content: ''; position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  width: 40px; height: 4px; background: var(--text-ghost); border-radius: 2px;
}

/* ── PREVIEW & PLAYER ── */
.preview-shell {
  aspect-ratio: 16/9; width: 100%; background: #000; border-radius: 20px;
  overflow: hidden; border: 1px solid var(--glass-border); margin-bottom: 20px;
}
.video-wrap { width: 100%; height: 100%; position: relative; }
.v-controls {
  display: flex; align-items: center; gap: 12px; padding: 12px;
  background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
}
.play-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.scrub { flex: 1; height: 4px; -webkit-appearance: none; background: rgba(255,255,255,0.2); border-radius: 2px; }

/* ── BUTTONS ── */
.btn {
  padding: 14px 20px; border-radius: 18px; font-weight: 700; font-size: 14px;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.2s; border: none; cursor: pointer;
}
.btn-primary { background: var(--accent-gradient); color: #fff; box-shadow: 0 4px 15px var(--accent-glow); }
.btn-ghost { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--glass-border); }
.btn-success { background: var(--green); color: #050508; }
.btn-danger { background: var(--red-muted); color: var(--red); }

/* ── FLOATING NAVIGATION ── */
.mobile-nav-wrap {
  position: fixed; bottom: calc(var(--safe-bottom) + 16px); left: 0; right: 0;
  display: flex; justify-content: center; z-index: 1000; padding: 0 20px;
}
.mobile-nav {
  background: var(--bg-glass-strong); backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border-bright); border-radius: 99px;
  display: flex; align-items: center; justify-content: space-around;
  padding: 8px; width: 100%; max-width: 440px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}
.nav-item {
  position: relative; width: 64px; height: 60px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px; color: var(--text-muted);
  -webkit-tap-highlight-color: transparent;
}
.nav-item.active { color: #fff; }
.nav-item svg { width: 22px; height: 22px; transition: transform 0.2s; }
.nav-item.active svg { transform: translateY(-3px); }
.nav-item span { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: calc(var(--safe-bottom) + 90px); right: 20px;
  width: 56px; height: 56px; border-radius: 20px; background: var(--accent);
  color: #fff; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 24px var(--accent-glow); z-index: 999;
}

/* ── GLOBAL FIXES ── */
@media(max-width: 767px) {
  body { overflow-x: hidden; }
  .app-body { padding-bottom: 200px; } /* Space for nav + safe area */
  .sidebar, .topbar { display: none !important; }
}

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ── SEARCH BAR ──────────────────────────────── */
.search-wrap{position:relative;margin-left:auto;flex-shrink:0}
.search-wrap input{
  background:var(--bg-elevated);border:1px solid var(--border-subtle);
  border-radius:var(--r-md);padding:7px 11px 7px 32px;
  font-size:13px;
  color:var(--text-primary);outline:none;transition:all .15s;width:160px;
}
.search-wrap input:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(99,102,241,.08);width:200px}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.45}

/* ── QUICK STATS BANNER ──────────────────────── */
.stats-banner{
  display:flex;gap:0;border-bottom:1px solid var(--border-subtle);
  background:var(--bg-raised);flex-shrink:0;overflow-x:auto;
  scrollbar-width:none;
}
.stats-banner::-webkit-scrollbar{display:none}
.stat-pill{
  display:flex;align-items:center;gap:8px;padding:10px 16px;
  border-right:1px solid var(--border-subtle);white-space:nowrap;flex-shrink:0;
}
.stat-pill:last-child{border-right:none}
.stat-pill-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.stat-pill-label{font-size:10.5px;color:var(--text-muted);font-family:var(--font-display);text-transform:uppercase;letter-spacing:.5px}
.stat-pill-count{font-size:14px;font-weight:700;color:var(--text-primary);font-family:var(--font-display);margin-left:auto}

/* ── TOAST ───────────────────────────────────── */
.toast-stack{position:fixed;bottom:calc(var(--mobile-nav-h) + var(--safe-bottom) + 12px);right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
@media(min-width:768px){.toast-stack{bottom:20px}}
.toast{
  display:flex;align-items:center;gap:9px;padding:11px 16px;
  background:var(--bg-floating);border:1px solid var(--border-strong);
  border-radius:var(--r-lg);font-size:13px;color:var(--text-primary);
  box-shadow:0 8px 28px rgba(0,0,0,.55);
  animation:toastIn .22s cubic-bezier(.34,1.56,.64,1);
  pointer-events:all;max-width:320px;
}
@keyframes toastIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
.toast-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── EMPTY STATES ────────────────────────────── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:56px 20px;text-align:center;color:var(--text-muted)}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:.45}
.empty-title{font-size:16px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;font-family:var(--font-display)}
.empty-sub{font-size:13px;line-height:1.5}

/* ── MODALS ─────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(5,5,10,.85);z-index:1000;
  display:flex;align-items:flex-end;justify-content:center;
  padding:0;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  animation:fadeIn .18s ease;
}
@media(min-width:768px){
  .modal-overlay{align-items:center;padding:20px}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--bg-raised);border:1px solid var(--border-strong);
  border-radius:var(--r-2xl) var(--r-2xl) 0 0;
  padding:8px 24px 24px;width:100%;max-width:100%;
  box-shadow:0 -20px 60px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.04);
  animation:sheetIn .28s cubic-bezier(.4,0,.2,1);
  /* Drag indicator */
  padding-top:20px;position:relative;
  max-height:88dvh;overflow-y:auto;
}
.modal::before{
  content:'';position:absolute;top:10px;left:50%;transform:translateX(-50%);
  width:36px;height:4px;border-radius:2px;background:var(--border-strong);
}
@keyframes sheetIn{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(min-width:768px){
  .modal{
    border-radius:var(--r-xl);max-width:440px;
    max-height:90vh;padding:26px;
    animation:modalIn .2s cubic-bezier(.34,1.26,.64,1);
  }
  .modal::before{display:none}
}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-sm{max-width:100%}
.modal-lg{max-width:100%}
@media(min-width:768px){.modal-sm{max-width:380px}.modal-lg{max-width:560px}}
.modal-title{font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--text-primary);margin-bottom:20px;letter-spacing:-.2px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;padding-top:16px;border-top:1px solid var(--border-subtle)}
.field{margin-bottom:16px}
.delete-confirm{background:var(--red-muted);border:1px solid rgba(248,113,113,.2);border-radius:var(--r-md);padding:14px;margin-bottom:4px}
.delete-confirm-text{font-size:13px;color:var(--text-secondary);line-height:1.6}

/* ── DETAIL PAGE ─────────────────────────────── */
.detail-shell{display:flex;height:100%;overflow:hidden}
.detail-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.detail-body{display:flex;flex:1;overflow:hidden}
.preview-zone{
  flex:1;display:flex;flex-direction:column;
  background:var(--bg-void);padding:14px;overflow:hidden;min-width:0;
}
.preview-container{
  position:relative;border-radius:var(--r-lg);overflow:hidden;
  background:#000;flex:1;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border-subtle);min-height:0;
}
.preview-placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;color:var(--text-muted);text-align:center;padding:24px;
}
.preview-placeholder-icon{font-size:40px;opacity:.3}
.video-controls{
  display:flex;align-items:center;gap:10px;padding:12px 0 0;flex-shrink:0;
}
.play-btn{
  width:40px;height:40px;border-radius:50%;background:var(--accent);
  border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.play-btn:hover{background:var(--accent-hover);box-shadow:0 0 14px var(--accent-glow)}
.play-btn:active{transform:scale(.92)}
.scrub-bar{
  flex:1;height:4px;border-radius:2px;background:var(--bg-active);
  cursor:pointer;-webkit-appearance:none;outline:none;border:none;
}
.scrub-bar::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 0 3px var(--accent-glow)}
.timecode{font-family:var(--mono);font-size:11.5px;color:var(--text-secondary);white-space:nowrap;flex-shrink:0}
.ts-capture-btn{
  padding:7px 11px;border-radius:var(--r-sm);background:var(--bg-elevated);
  border:1px solid var(--border-default);color:var(--text-secondary);
  font-size:12px;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:4px;flex-shrink:0;font-family:var(--font);min-height:36px;
}
.ts-capture-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-muted)}
.ts-capture-btn.active{background:var(--accent-muted);border-color:var(--accent);color:var(--accent)}

/* Context Panel */
.ctx-header{
  padding:12px 14px;border-bottom:1px solid var(--border-subtle);
  display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.ctx-tab{
  padding:7px 13px;border-radius:var(--r-sm);font-size:12.5px;font-weight:500;
  cursor:pointer;border:none;background:none;color:var(--text-secondary);
  transition:all .12s;font-family:var(--font);min-height:36px;
}
.ctx-tab.active{background:var(--accent-muted);color:var(--accent-light)}
.ctx-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;-webkit-overflow-scrolling:touch}

/* Comments */
.cmt-list{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:9px;-webkit-overflow-scrolling:touch}
.cmt-item{background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:var(--r-md);padding:11px 12px;transition:border-color .12s}
.cmt-item:hover{border-color:var(--border-default)}
.cmt-header{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.cmt-author{font-size:12.5px;font-weight:600;color:var(--text-primary);font-family:var(--font-display)}
.cmt-time{font-size:10.5px;color:var(--text-muted);margin-left:auto}
.cmt-body{font-size:13px;color:var(--text-secondary);line-height:1.55;word-break:break-word}
.mention{color:var(--accent-light);font-weight:500;background:var(--accent-muted);padding:1px 4px;border-radius:4px}
.ts-chip{
  display:inline-flex;align-items:center;gap:4px;padding:4px 9px;
  border-radius:99px;font-size:11px;font-weight:600;font-family:var(--mono);
  background:var(--blue-muted);color:var(--blue);border:none;cursor:pointer;
  margin-bottom:5px;transition:all .12s;
}
.ts-chip:hover{background:var(--blue);color:#fff}
.cmt-compose{padding:10px 12px;border-top:1px solid var(--border-subtle);flex-shrink:0;display:flex;flex-direction:column;gap:8px}

/* Info panel */
.info-panel{padding:12px;display:flex;flex-direction:column;gap:0}
.info-section-title{font-size:10px;font-weight:700;color:var(--text-ghost);text-transform:uppercase;letter-spacing:1.2px;padding:14px 2px 6px;font-family:var(--font-display)}
.info-row{display:flex;flex-direction:column;gap:4px;padding:10px 2px;border-bottom:1px solid var(--border-ghost)}
.info-row:last-child{border-bottom:none}
.info-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;font-family:var(--font-display)}
.info-val{font-size:13px;color:var(--text-primary)}
.assignee-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.asgn-chip{display:flex;align-items:center;gap:5px;padding:4px 8px 4px 5px;border-radius:99px;background:var(--bg-floating);border:1px solid var(--border-subtle);font-size:12px}
.chip-rm{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;line-height:1;padding:0 2px;transition:color .1s;min-width:20px;min-height:20px;display:flex;align-items:center;justify-content:center}
.chip-rm:hover{color:var(--red)}

/* Review template */
.review-templates{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.review-tpl{
  padding:6px 12px;border-radius:99px;font-size:11.5px;font-weight:500;
  cursor:pointer;border:1.5px solid transparent;background:var(--bg-floating);
  color:var(--text-secondary);transition:all .12s;font-family:var(--mono);min-height:34px;display:flex;align-items:center;
}
.review-tpl.selected{font-weight:600}

/* Mention dropdown */
.mention-drop{
  position:absolute;bottom:100%;left:0;right:0;background:var(--bg-floating);
  border:1px solid var(--border-strong);border-radius:var(--r-md);
  padding:5px;display:none;max-height:160px;overflow-y:auto;z-index:50;
  box-shadow:0 -12px 32px rgba(0,0,0,.45);
}
.mention-drop.open{display:block}
.mention-item{padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;font-size:13px;transition:background .1s;min-height:var(--touch-min);display:flex;align-items:center}
.mention-item:hover{background:var(--bg-hover)}

/* ── CAMPAIGNS ───────────────────────────────── */
.campaign-grid{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:540px){.campaign-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}}
.campaign-card{
  position:relative;overflow:hidden;border-radius:var(--r-lg);
  background:var(--bg-elevated);border:1px solid var(--border-subtle);
  padding:20px;cursor:pointer;transition:all .2s;
}
.campaign-card:hover{border-color:var(--border-default);transform:translateY(-2px);box-shadow:0 14px 36px rgba(0,0,0,.42)}
.campaign-card:active{transform:translateY(0)}
.cc-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:14px;margin-top:8px}
.cc-name{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--text-primary);line-height:1.3;flex:1}
.cc-actions{display:flex;gap:5px;opacity:0;transition:opacity .15s;flex-shrink:0}
.campaign-card:hover .cc-actions{opacity:1}
.cc-month{font-size:11.5px;color:var(--text-muted);margin-bottom:14px;font-family:var(--mono)}
.cc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cc-stat{background:var(--bg-floating);border-radius:var(--r-sm);padding:9px 10px;text-align:center;border:1px solid var(--border-ghost)}
.cc-stat strong{display:block;font-size:18px;font-weight:700;font-family:var(--font-display);color:var(--text-primary)}
.cc-stat span{font-size:9.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;font-family:var(--font-display)}
.cc-progress{margin-top:14px}
.cc-progress-bar{height:3px;background:var(--bg-active);border-radius:2px;overflow:hidden;margin-top:5px}
.cc-progress-fill{height:100%;border-radius:2px;transition:width .4s ease}
.cc-progress-label{font-size:10.5px;color:var(--text-muted);display:flex;justify-content:space-between}

/* Campaign Detail */
.camp-detail-shell{display:flex;flex-direction:column;height:100%;overflow:hidden}
.camp-hero{padding:18px 16px 14px;border-bottom:1px solid var(--border-subtle);background:var(--bg-raised);flex-shrink:0}
.camp-hero-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.camp-hero-dot{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.camp-hero-name{font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--text-primary);letter-spacing:-.3px}
.camp-hero-meta{font-size:12.5px;color:var(--text-muted);margin-top:2px}
.camp-stats-bar{display:flex;gap:16px;flex-wrap:wrap;overflow-x:auto;scrollbar-width:none}
.camp-stats-bar::-webkit-scrollbar{display:none}
.camp-stat-pill{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--text-secondary);flex-shrink:0}
.camp-stat-pill strong{color:var(--text-primary);font-family:var(--font-display);font-size:15px;font-weight:700}
.camp-stage-filter{display:flex;gap:6px;flex-wrap:nowrap;margin-top:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.camp-stage-filter::-webkit-scrollbar{display:none}
.camp-stage-chip{padding:6px 13px;border-radius:99px;font-size:11.5px;font-weight:500;cursor:pointer;border:1.5px solid var(--border-subtle);background:var(--bg-elevated);color:var(--text-secondary);transition:all .12s;font-family:var(--mono);white-space:nowrap;flex-shrink:0;min-height:34px;display:flex;align-items:center}
.camp-stage-chip.active{font-weight:600}

/* ── NOTIFICATIONS ───────────────────────────── */
.notif-list{display:flex;flex-direction:column;gap:4px}
.notif-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px 16px;border-radius:var(--r-md);cursor:pointer;
  transition:background .12s;border:1px solid transparent;min-height:64px;
}
.notif-item:hover{background:var(--bg-elevated);border-color:var(--border-subtle)}
.notif-item.unread{background:var(--bg-elevated);border-color:var(--border-subtle)}
.notif-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.notif-dot:not(.read){background:var(--accent);box-shadow:0 0 8px var(--accent)}
.notif-dot.read{background:var(--text-ghost)}
.notif-text{font-size:13px;color:var(--text-primary);flex:1;line-height:1.5}
.notif-time{font-size:11px;color:var(--text-muted);white-space:nowrap;font-family:var(--mono)}

/* ── TEAM ───────────────────────────────────────── */
.team-list{display:flex;flex-direction:column;gap:7px}
.team-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;background:var(--bg-elevated);
  border:1px solid var(--border-subtle);border-radius:var(--r-md);
  transition:all .12s;min-height:64px;
}
.team-row:hover{border-color:var(--border-default)}
.tr-info{flex:1;min-width:0}
.tr-name{font-size:13.5px;font-weight:500;color:var(--text-primary);font-family:var(--font-display)}
.tr-email{font-size:11.5px;color:var(--text-muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tr-status{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 6px var(--green)}

/* ── TRIGGERS / AUTOMATION ───────────────────── */
.trigger-list{display:flex;flex-direction:column;gap:7px}
.trigger-row{
  display:flex;align-items:center;gap:14px;
  padding:16px;background:var(--bg-elevated);
  border:1px solid var(--border-subtle);border-radius:var(--r-md);
  transition:border-color .12s;min-height:64px;
}
.trigger-row:hover{border-color:var(--border-default)}
.trigger-info{flex:1}
.trigger-name{font-size:13.5px;font-weight:500;color:var(--text-primary);font-family:var(--font-display)}
.trigger-desc{font-size:12px;color:var(--text-muted);margin-top:2px}
.toggle-switch{position:relative;display:inline-block;width:44px;height:26px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--bg-active);border-radius:26px;transition:.2s;border:1px solid var(--border-default)}
.toggle-slider:before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:var(--text-muted);border-radius:50%;transition:.2s}
.toggle-switch input:checked+.toggle-slider{background:var(--accent);border-color:var(--accent)}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(18px);background:#fff}

/* ── INTEGRATIONS ────────────────────────────── */
.integration-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:540px){.integration-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}}
.int-card{background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:var(--r-lg);padding:18px;transition:all .17s}
.int-card:hover{border-color:var(--border-default);transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.32)}
.int-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.int-icon{width:40px;height:40px;border-radius:10px;background:var(--bg-floating);border:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.int-name{font-size:14px;font-weight:600;color:var(--text-primary);font-family:var(--font-display)}
.int-desc{font-size:12.5px;color:var(--text-muted);line-height:1.5}
.int-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid var(--border-ghost)}
.int-status{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:5px}
.int-status-dot{width:5px;height:5px;border-radius:50%;background:var(--text-ghost)}
.int-status-dot.connected{background:var(--green);box-shadow:0 0 6px var(--green)}

/* ── SHEETS GUIDE ────────────────────────────── */
.sheets-guide{display:flex;flex-direction:column;height:100%;overflow:hidden}
.guide-body{padding:18px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.guide-step{display:flex;gap:14px;padding:16px;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:var(--r-lg);margin-bottom:10px;transition:border-color .12s}
.guide-step:hover{border-color:var(--border-default)}
.guide-step-num{width:30px;height:30px;border-radius:50%;background:var(--accent-muted);border:1px solid rgba(99,102,241,.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent-light);flex-shrink:0;font-family:var(--font-display)}
.guide-step-content{flex:1}
.guide-step-title{font-size:13.5px;font-weight:600;color:var(--text-primary);margin-bottom:4px;font-family:var(--font-display)}
.guide-step-desc{font-size:12.5px;color:var(--text-secondary);line-height:1.6}
.guide-code{background:var(--bg-void);border:1px solid var(--border-subtle);border-radius:var(--r-sm);padding:12px 14px;font-family:var(--mono);font-size:11.5px;color:var(--cyan);margin-top:8px;overflow-x:auto;line-height:1.6;white-space:pre}
.guide-status-banner{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:var(--r-md);background:var(--amber-muted);border:1px solid rgba(251,191,36,.2);margin-bottom:16px}
.guide-connected-banner{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:var(--r-md);background:var(--green-muted);border:1px solid rgba(52,211,153,.2);margin-bottom:16px}

/* ── RECENTLY DELETED ────────────────────────── */
.deleted-list{display:flex;flex-direction:column;gap:7px}
.deleted-row{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:var(--r-md);opacity:.7;transition:opacity .12s;min-height:64px}
.deleted-row:hover{opacity:1;border-color:var(--border-default)}

/* ── UPLOAD CENTER ───────────────────────────── */
.upload-center{display:flex;flex-direction:column;height:100%;overflow:hidden}
.uc-body{display:flex;flex-direction:column;gap:14px;padding:16px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
@media(min-width:768px){.uc-body{display:grid;grid-template-columns:1fr 300px}}
.drop-zone{
  border:2px dashed var(--border-default);border-radius:var(--r-xl);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:44px 20px;cursor:pointer;transition:all .2s;min-height:180px;
  background:var(--bg-elevated);text-align:center;
}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:var(--accent-muted)}
.drop-zone:active{transform:scale(.99)}
.drop-zone-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.drop-zone-title{font-size:15px;font-weight:600;color:var(--text-primary);font-family:var(--font-display)}
.drop-zone-sub{font-size:12.5px;color:var(--text-muted);margin-top:4px}
.upload-config{background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:var(--r-lg);padding:18px;display:flex;flex-direction:column;gap:14px;height:fit-content}
@media(min-width:768px){.upload-config{order:-1}}
.uc-field-label{font-size:11.5px;font-weight:600;color:var(--text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-family:var(--font-display)}
.upload-queue-header{display:flex;align-items:center;justify-content:space-between;padding:0 0 10px}
.queue-title{font-size:14px;font-weight:600;color:var(--text-primary);font-family:var(--font-display)}
.upload-queue{display:flex;flex-direction:column;gap:7px}
.queue-item{background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:var(--r-md);padding:13px 14px}
.qi-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.qi-filename{font-size:13px;font-weight:500;color:var(--text-primary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qi-size{font-size:11.5px;color:var(--text-muted);font-family:var(--mono);flex-shrink:0}
.qi-status{font-size:11px;font-family:var(--mono);padding:3px 8px;border-radius:99px;flex-shrink:0}
.qi-status.queued{background:var(--bg-active);color:var(--text-muted)}
.qi-status.uploading{background:var(--blue-muted);color:var(--blue)}
.qi-status.done{background:var(--green-muted);color:var(--green)}
.qi-status.error{background:var(--red-muted);color:var(--red)}
.qi-cancel{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;font-size:18px;line-height:1;transition:color .1s;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.qi-cancel:hover{color:var(--red);background:var(--red-muted)}
.progress-bar{height:3px;background:var(--bg-active);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:2px;transition:width .2s}

/* Upload modal */
.up-zone{border:2px dashed var(--border-default);border-radius:var(--r-lg);padding:28px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg-elevated);margin-bottom:4px}
.up-zone:hover,.up-zone.drag{border-color:var(--accent);background:var(--accent-muted)}
.prog-wrap{display:none;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:var(--r-md);padding:14px;margin-top:4px}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;font-size:12px}
.prog-bar-bg{height:4px;background:var(--bg-active);border-radius:2px;overflow:hidden}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:2px;transition:width .2s}

/* Table */
.table-view{flex:1;overflow:auto;padding:14px;-webkit-overflow-scrolling:touch}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;padding:9px 13px;font-size:10.5px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;font-family:var(--font-display);border-bottom:1px solid var(--border-subtle);background:var(--bg-raised);position:sticky;top:0;z-index:1}
.data-table td{padding:11px 13px;border-bottom:1px solid var(--border-ghost);vertical-align:middle}
.data-table tr{cursor:pointer;transition:background .1s}
.data-table tr:hover td{background:var(--bg-hover)}

/* ── BADGES ─────────────────────────────────── */
.badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;
  font-family:var(--mono);white-space:nowrap;
}

/* ── AVATAR ─────────────────────────────────── */
.avatar{
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:600;color:#fff;flex-shrink:0;font-family:var(--font-display);
  user-select:none;
}

/* Workspace switcher */
.ws-switcher{
  display:flex;align-items:center;gap:8px;padding:10px 12px;
  border-radius:var(--r-md);background:var(--bg-elevated);
  border:1px solid var(--border-subtle);cursor:pointer;
  transition:all .15s;position:relative;min-height:var(--touch-min);
}
.ws-switcher:hover{background:var(--bg-floating);border-color:var(--border-default)}
.ws-dot{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0;font-family:var(--font-display)}
.ws-name{font-size:12.5px;font-weight:500;color:var(--text-primary);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ws-chevron{color:var(--text-muted);font-size:10px;flex-shrink:0;transition:transform .15s}
.ws-switcher.open .ws-chevron{transform:rotate(180deg)}
.ws-dropdown{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--bg-floating);border:1px solid var(--border-strong);
  border-radius:var(--r-lg);padding:6px;z-index:300;
  box-shadow:0 24px 56px rgba(0,0,0,.75);display:none;
}
.ws-dropdown.open{display:block;animation:dropIn .15s ease}
@keyframes dropIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.ws-opt{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:var(--r-sm);cursor:pointer;transition:background .1s;min-height:var(--touch-min)}
.ws-opt:hover{background:var(--bg-hover)}
.ws-opt-name{font-size:12.5px;font-weight:500;color:var(--text-primary)}
.ws-opt-sub{font-size:10.5px;color:var(--text-muted);margin-top:1px}
.ws-opt-check{color:var(--accent);font-size:12px;margin-left:auto}
.ws-add-btn{display:flex;align-items:center;gap:7px;padding:9px 11px;border-radius:var(--r-sm);cursor:pointer;color:var(--accent);font-size:12.5px;font-weight:500;margin-top:3px;border-top:1px solid var(--border-subtle);padding-top:10px;transition:background .1s;min-height:var(--touch-min)}
.ws-add-btn:hover{background:var(--accent-muted)}

/* ── MOBILE LAYOUT OVERRIDES ────────────────── */
@media(max-width:767px){
  body{padding-bottom:calc(var(--mobile-nav-h) + var(--safe-bottom))}
  .app-body{flex-direction:row;flex:1;overflow:hidden}
  .detail-body{flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .preview-zone{min-height:auto;flex:none;padding:10px}
  .context-panel{
    width:100%!important;min-width:100%!important;opacity:1!important;
    border-left:none;border-top:1px solid var(--border-subtle);
    max-height:48dvh;overflow:hidden;display:flex;flex-direction:column;
  }
  .context-panel.hidden{display:none!important}
  .pipeline-track{display:none!important}
  .stats-banner .stat-pill:nth-child(n+5){display:none}
  .group-select{display:none}
  /* Kanban bottom padding so last cards clear FAB */
  .kanban-board{padding:10px 8px calc(var(--mobile-nav-h) + var(--safe-bottom) + 64px)}
  .kboard-col{width:248px;min-width:248px}
  .topbar{padding:0 12px;gap:6px}
  .tb-page-title{font-size:15px}
  /* Sheets guide code block scrollable */
  .guide-code{font-size:10.5px}
  /* Detail shell on mobile fills full height */
  .detail-shell{flex-direction:column}
  .detail-main{height:100dvh;overflow:hidden}
}
/* ── DESKTOP OVERRIDES ──────────────────────── */
@media(min-width:768px){
  .app-body{flex:1;overflow:hidden}
  .mobile-nav{display:none!important}
  .fab{display:none!important}
  .mobile-menu-btn{display:none!important}
  body{padding-bottom:0!important}
}

/* ── MODAL MOBILE FULL-WIDTH BUTTONS ─────────── */
@media(max-width:767px){
  .modal-footer{flex-direction:column-reverse;gap:8px}
  .modal-footer .btn{width:100%;justify-content:center}
  .modal-footer .btn-ghost{order:2}

    S.isPlaying=!S.isPlaying;
    if(S.isPlaying){
      if(pb)pb.innerHTML=PAUSE_SVG;
      S.playInterval=setInterval(()=>{
        S.currentTime=Math.min(S.currentTime+0.5,S.duration);
        const pct=(S.currentTime/S.duration)*100;
        const sc=qs('#scrub');if(sc)sc.value=pct;
        const td=qs('#timecode');if(td)td.textContent=fmt(S.currentTime)+' / '+fmt(S.duration);
        if(S.currentTime>=S.duration){S.isPlaying=false;clearInterval(S.playInterval);if(pb)pb.innerHTML=PLAY_SVG;}
      },500);
    }else{clearInterval(S.playInterval);if(pb)pb.innerHTML=PLAY_SVG;}
  }
}
function seekTo(secs){
  S.currentTime=secs;
  const vid=qs('#preview-vid');
  if(vid){vid.currentTime=secs;}
  const sc=qs('#scrub');if(sc)sc.value=(secs/Math.max(S.duration,1))*100;
  const td=qs('#timecode');if(td)td.textContent=fmt(secs)+' / '+fmt(S.duration);
}

   ╚══════════════════════════════════════════════════════╝ */
function showToast(msg,color='var(--accent)'){
  const w=document.getElementById('toasts');
  const t=mk('div','toast');
  const d=mk('div','toast-dot');d.style.background=color;
  const m=mk('span');m.textContent=msg;
  t.append(d,m);w.appendChild(t);
  requestAnimationFrame(()=>setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(8px)';t.style.transition='all .3s';setTimeout(()=>t.remove(),300)},3200));
}

// Swipe-down to close modals on mobile
function addSwipeClose(overlay,modal){
  if(window.innerWidth>=768)return;
  let startY=0,curY=0,dragging=false;
  modal.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;dragging=true;modal.style.transition='none';},{passive:true});
  modal.addEventListener('touchmove',e=>{if(!dragging)return;curY=e.touches[0].clientY;const dy=Math.max(0,curY-startY);modal.style.transform=`translateY(${dy}px)`;},{passive:true});
  modal.addEventListener('touchend',()=>{
    if(!dragging)return;dragging=false;
    const dy=curY-startY;
    modal.style.transition='transform .25s cubic-bezier(.4,0,.2,1)';
    if(dy>100){modal.style.transform='translateY(100%)';setTimeout(()=>overlay.remove(),250);}
    else{modal.style.transform='';}
  });
}

/* ╔══════════════════════════════════════════════════════╗
   ║   CLOUDINARY SERVICE                                ║
   ╚══════════════════════════════════════════════════════╝ */
async function uploadToCloudinary(file,onProgress){
  if(file.size>500*1024*1024)throw new Error('File exceeds 500 MB limit');
  const fd=new FormData();
  fd.append('file',file);fd.append('upload_preset',CLD_PRESET);
  fd.append('folder',`framebase/${S.activeWs}`);
  return new Promise((resolve,reject)=>{
    const xhr=new XMLHttpRequest();
    xhr.open('POST',`https://api.cloudinary.com/v1_1/${CLD_CLOUD}/auto/upload`);
    xhr.upload.onprogress=e=>{if(e.lengthComputable)onProgress(Math.round(e.loaded/e.total*100));};
    xhr.onload=()=>{
      if(xhr.status===200){resolve(JSON.parse(xhr.responseText));}
      else{
        let msg='Upload failed ('+xhr.status+')';
        try{const b=JSON.parse(xhr.responseText);if(b.error?.message){msg=b.error.message;if(msg.includes('preset'))msg='Upload preset "'+CLD_PRESET+'" not found. Check Cloudinary → Upload Presets.';}}catch(_){}
        reject(new Error(msg));
      }
    };
    xhr.onerror=()=>reject(new Error('Network error during upload'));
    xhr.timeout=600000;xhr.ontimeout=()=>reject(new Error('Upload timed out'));
    xhr.send(fd);
  });
}

/* ╔══════════════════════════════════════════════════════╗
   ║   GOOGLE SHEETS SYNC                                ║
   ╚══════════════════════════════════════════════════════╝ */
async function syncToSheets(action,data){
  if(!S.sheetsConnected||!S.sheetsUrl)return;
  try{
    await fetch(S.sheetsUrl,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action,workspace:S.activeWs,timestamp:new Date().toISOString(),...data}),
    });
  }catch(e){console.warn('[Sheets sync]',e.message);}
}
// Called once when the user connects/saves the Sheets URL
async function connectAndSyncSheets(url){
  S.sheetsUrl=url;S.sheetsConnected=true;
  showToast('Sheets connected — syncing…','var(--green)');
  await syncAllAssetsToSheets();
}
async function syncAllAssetsToSheets(){
  if(!S.sheetsConnected||!S.sheetsUrl)return;
  const rows=S.assets.filter(a=>!a.softDeleted).map(a=>({
    id:a.id,title:a.title,stage:stageById(a.stage).label,
    type:a.type||'',platform:a.platform||'',
    campaign:S.campaigns.find(c=>c.id===a.campaignId)?.name||'',
    assignees:( a.assignees||[]).map(uid=>S.members.find(m=>m.uid===uid)?.displayName||uid).join(', '),
    dueDate:a.dueDate||'',postDate:a.contentDate||'',
    version:'v'+(a.latestVersionNumber||0),
    updatedAt:a.updatedAt?.toDate?.()?.toISOString()||'',
    url:a.cloudinaryUrl||'',
  }));
  await syncToSheets('FULL_SYNC',{rows});
  showToast('Synced '+rows.length+' assets to Sheets','var(--green)');
}

async function getMember(uid){
  const snap=await getDoc(doc(db,'workspaces',S.activeWs,'members',uid));
  return snap.exists()?{id:snap.id,...snap.data()}:null;
}
async function ensureMember(uid,email,displayName){
  let m=null;
  try{m=await getMember(uid);}catch(e){throw e;}
  if(m)return m;
  let count=0;
  try{const s=await getDocs(collection(db,'workspaces',S.activeWs,'members'));count=s.size;}catch(_){}
  const role=count===0?ROLES.ADMIN:ROLES.EDITOR_INHOUSE;
  const data={uid,email,displayName:displayName||email.split('@')[0],role,isActive:true,createdAt:serverTimestamp()};
  await setDoc(doc(db,'workspaces',S.activeWs,'members',uid),data);
  return data;
}
async function pushNotification(targetUids,text,assetId=''){
  for(const uid of targetUids){
    addDoc(collection(db,'workspaces',S.activeWs,'notifications'),{uid,text,assetId,read:false,createdAt:serverTimestamp()}).catch(()=>{});
  }
}
function listenComments(assetId,cb){
  return onSnapshot(
    query(collection(db,'workspaces',S.activeWs,'assets',assetId,'comments'),orderBy('createdAt','asc')),
    snap=>cb(snap.docs.map(d=>({id:d.id,...d.data()}))),
    err=>console.error('comments:',err.code)
  );
}
function startListeners(){
  S.unsubs.forEach(u=>u());S.unsubs=[];
  const watchAssets=onSnapshot(
    query(collection(db,'workspaces',S.activeWs,'assets'),orderBy('updatedAt','desc')),
    snap=>{
      S.assets=snap.docs.map(d=>({id:d.id,...d.data()}));
      render();
      // Real-time Google Sheets sync — push every changed asset
      if(S.sheetsConnected&&S.sheetsUrl){
        snap.docChanges().forEach(change=>{
          if(change.type==='added'||change.type==='modified'){
            const a={id:change.doc.id,...change.doc.data()};
            if(!a.softDeleted){
              syncToSheets('ASSET_UPDATED',{
                assetId:a.id,title:a.title,
                stage:stageById(a.stage).label,
                type:a.type||'',platform:a.platform||'',
                version:'v'+(a.latestVersionNumber||0),
                updatedAt:a.updatedAt?.toDate?.()?.toISOString()||new Date().toISOString(),
                url:a.cloudinaryUrl||'',
              });
            }
          }
        });
      }
    },
    err=>console.error('assets:',err.code)
  );
  const watchMembers=onSnapshot(collection(db,'workspaces',S.activeWs,'members'),
    snap=>{S.members=snap.docs.map(d=>({id:d.id,...d.data()}));render();},
    err=>console.error('members:',err.code)
  );
  const watchCampaigns=onSnapshot(collection(db,'workspaces',S.activeWs,'campaigns'),
    snap=>{S.campaigns=snap.docs.map(d=>({id:d.id,...d.data()}));render();},
    err=>console.error('campaigns:',err.code)
  );
  const watchGroups=onSnapshot(collection(db,'workspaces',S.activeWs,'groups'),
    snap=>{const ex=new Set(S.campaigns.map(c=>c.id));snap.docs.forEach(d=>{if(!ex.has(d.id))S.campaigns.push({id:d.id,...d.data()})});render();},
    err=>console.warn('groups:',err.code)
  );
  const watchNotifs=onSnapshot(
    query(collection(db,'workspaces',S.activeWs,'notifications'),orderBy('createdAt','desc')),
    snap=>{
      S.notifications=snap.docs.map(d=>({id:d.id,...d.data()}));
      render();
      snap.docChanges().forEach(change => {
        if(change.type==='added'){
          const n=change.doc.data();
          if(!change.doc.metadata?.hasPendingWrites && n.uid===S.authUser?.uid && !n.read){
            if(window.Notification && Notification.permission==='granted'){
              new Notification('FrameBase Pro',{body:n.text});
            }
          }
        }
      });
    },
    err=>console.error('notifs:',err.code)
  );
  S.unsubs.push(watchAssets,watchMembers,watchCampaigns,watchGroups,watchNotifs);
}

/* ╔══════════════════════════════════════════════════════╗
   ║   ASSET DELETION                                    ║
   ╚══════════════════════════════════════════════════════╝ */
function showDeleteModal(assetId){
  const asset=S.assets.find(a=>a.id===assetId);if(!asset)return;
  const overlay=mk('div','modal-overlay');
  const modal=mk('div','modal modal-sm');
  const title=mk('div','modal-title');title.textContent='Delete Asset';modal.appendChild(title);
  const confirm=mk('div','delete-confirm');
  confirm.innerHTML=`<div class="delete-confirm-text">You're about to delete <strong style="color:var(--text-primary)">"${asset.title}"</strong>. It will be soft-deleted and restorable for 7 days from <em>Recently Deleted</em>.</div>`;
  modal.appendChild(confirm);
  const footer=mk('div','modal-footer');
  const cb=mk('button','btn btn-ghost');cb.textContent='Cancel';cb.addEventListener('click',()=>overlay.remove());
  const del=mk('button','btn btn-danger');del.textContent='Delete Asset';
  del.addEventListener('click',async()=>{
    del.disabled=true;del.textContent='Deleting…';
    await deleteAsset(assetId);overlay.remove();
  });
  footer.append(cb,del);modal.appendChild(footer);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  overlay.appendChild(modal);addSwipeClose(overlay,modal);document.body.appendChild(overlay);
}
async function deleteAsset(assetId){
  const asset=S.assets.find(a=>a.id===assetId);if(!asset)return;
  try{
    await updateDoc(doc(db,'workspaces',S.activeWs,'assets',assetId),{softDeleted:true,deletedAt:serverTimestamp(),deletedByUid:S.authUser.uid});
    if(asset.cloudinaryPublicId){
      await addDoc(collection(db,'workspaces',S.activeWs,'deletionQueue'),{publicId:asset.cloudinaryPublicId,assetId,resourceType:asset.type==='VIDEO'?'video':'image',requestedAt:serverTimestamp(),requestedByUid:S.authUser.uid,processed:false});
    }
    syncToSheets('ASSET_DELETED',{assetId,title:asset.title});
    showToast('Asset deleted — restorable for 7 days','var(--red)');
    if(S.selectedAsset?.id===assetId){S.selectedAsset=null;S.showContextPanel=false;S.page='kanban';}
    render();
  }catch(e){showToast('Delete failed: '+e.message,'var(--red)');}
}
async function restoreAsset(assetId){
  await updateDoc(doc(db,'workspaces',S.activeWs,'assets',assetId),{softDeleted:false,deletedAt:null,deletedByUid:null});
  showToast('Asset restored','var(--green)');render();
}

onAuthStateChanged(auth,async fbUser=>{
  if(!fbUser){S.authUser=null;S.member=null;S.unsubs.forEach(u=>u());S.unsubs=[];S.page='login';render();return;}
  S.authUser=fbUser;S.page='loading';render();
  try{
    S.member=await ensureMember(fbUser.uid,fbUser.email,fbUser.displayName||'');
    startListeners();S.page='kanban';
  }catch(err){
    S.page='login';S.authUser=null;
    await signOut(auth).catch(()=>{});
    showToast('Sign in error: '+err.message,'var(--red)');
  }
  render();
});

/* ── MASTER RENDER ── */
function render(){
  const root = qs('#app'); root.innerHTML = '';
  
  if(S.page === 'loading'){
    root.innerHTML = `<div class="loading-screen"><div class="spinner"></div><div class="logo-text">FRAMEBASE</div></div>`;

  if(S.page === 'login'){ renderLogin(root); return; }

  // Premium Mobile Header
  if(window.innerWidth < 768) {
    mainArea.appendChild(renderMobileHeader());
  } else {
    renderSidebar(appBody);
  }

  // Page Routing
  switch(S.page){
    case 'kanban':         renderAssets(mainArea); break;
    case 'detail':         renderDetail(mainArea); break;
    case 'upload':         renderUploadCenter(mainArea); break;
    case 'campaigns':      renderCampaigns(mainArea); break;

    case 'notif':          renderNotifications(mainArea); break;
    case 'profile':        renderProfile(mainArea); break;

  appBody.appendChild(mainArea);

  if(window.innerWidth < 768) {
    renderMobileNav(root);
    renderFAB(root);
  }
}

  feats.forEach(f => {
    const card = mk('div', 'feature-card');
    card.innerHTML = `<div class="f-icon">${f.icon}</div><div class="f-title">${f.title}</div><div class="f-desc">${f.desc}</div>`;

  card.innerHTML = '<div class="login-logo-row"><div class="login-logo-mark" style="color:white">F</div><div><div class="login-title">Access Workspace</div><div class="login-sub" style="color:var(--text-secondary)">Sign in to your premium dashboard</div></div></div><div class="login-divider" style="height:1px; background:var(--border-subtle); margin:24px 0"></div>';
  
  const err = mk('div','err-msg'); err.id = 'login-err'; card.appendChild(err);
  
  const f1 = mk('div','field'); const l1 = mk('label'); l1.textContent = 'Email Address'; l1.style.color='var(--text-secondary)'; const i1 = mk('input'); i1.type = 'email'; i1.placeholder = 'you@studio.com'; i1.id = 'le'; i1.autocomplete = 'email'; f1.append(l1,i1); card.appendChild(f1);
  
  const f2 = mk('div','field'); f2.style.marginTop = '16px'; const l2 = mk('label'); l2.textContent = 'Password'; l2.style.color='var(--text-secondary)'; const i2 = mk('input'); i2.type = 'password'; i2.placeholder = '••••••••'; i2.id = 'lp'; i2.autocomplete = 'current-password'; f2.append(l2,i2); card.appendChild(f2);
  
  const btn = mk('button','btn-primary'); btn.style.cssText = 'width:100%; margin-top:28px; padding: 12px; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; justify-content: center;'; btn.textContent = 'Sign In to Workspace';
  btn.addEventListener('click', async () => {

    catch(e) {
      const msgs = {'auth/invalid-credential': 'Incorrect email or password.', 'auth/user-not-found': 'Account not found.', 'auth/too-many-requests': 'Too many attempts.'};

  });
  i2.addEventListener('keydown', e => { if(e.key === 'Enter') btn.click(); });
  card.appendChild(btn);
  logSec.appendChild(card);
  shell.appendChild(logSec);
  
  root.appendChild(shell);
}

/* ╔══════════════════════════════════════════════════════╗
   ║   RENDER — TOPBAR HELPER                            ║
   ╚══════════════════════════════════════════════════════╝ */
function makeTopbar(titleText,subText,rightFn,showMenuBtn=true){
  const tb=mk('div','topbar');

  // Hamburger — always present, hidden on desktop via CSS
  if(showMenuBtn){
    const mb=mk('button','mobile-menu-btn');
    mb.innerHTML=ICON('<line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>',22,2);
    mb.addEventListener('click',toggleMobileSidebar);tb.appendChild(mb);
  }

  const titleEl=mk('div','tb-page-title');titleEl.textContent=titleText;tb.appendChild(titleEl);
  // Only show breadcrumb on desktop
  if(subText){
    const sub=mk('div','tb-breadcrumb');sub.textContent='/ '+subText;
    sub.style.cssText='overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px';
    tb.appendChild(sub);
  }
  const right=mk('div','tb-right');if(rightFn)rightFn(right);tb.appendChild(right);
  return tb;
}

function makeStatsBanner(assets){
  const banner=mk('div','stats-banner');
  const relevant=assets.filter(a=>!a.softDeleted);
  const stats=[
    {label:'Total',count:relevant.length,color:'var(--text-muted)'},
    ...STAGES.slice(0,5).map(st=>({label:st.label.split(' ')[0],count:relevant.filter(a=>a.stage===st.id).length,color:st.color})),
  ];
  stats.forEach(s=>{
    const p=mk('div','stat-pill');
    const dot=mk('span','stat-pill-dot');dot.style.background=s.color;
    const lbl=mk('span','stat-pill-label');lbl.textContent=s.label;

    p.append(dot,lbl,cnt);banner.appendChild(p);
  });
  return banner;
}

/* ── ASSETS / DASHBOARD ── */
function renderAssets(main){
  const isMob = window.innerWidth < 768;
  if(!isMob) {
    // Legacy Desktop Assets Logic (Simplified for now)
    return renderAssetsDesktop(main);
  }

  const shell = mk('div', 'page-content page-enter');
  
  // 1. Insights
  const insights = mk('div', 'dashboard-insights');
  const totals = [
    { label: 'Pending', count: S.assets.filter(a=>a.stage==='raw'||a.stage==='editing').length, color: 'var(--accent)' },
    { label: 'In Review', count: S.assets.filter(a=>a.stage==='review').length, color: 'var(--amber)' },
    { label: 'Approved', count: S.assets.filter(a=>a.stage==='approved').length, color: 'var(--green)' }
  ];
  totals.forEach(t => {
    const box = mk('div', 'insight-box');
    box.innerHTML = `<div class="insight-label">${t.label}</div><div class="insight-count" style="color:${t.color}">${t.count}</div>`;
    insights.appendChild(box);
  });
  shell.appendChild(insights);

  // 2. Status Filters
  const filters = mk('div', 'status-filters');
  const allBtn = mk('button', 'status-pill' + (S.filterStage === 'ALL' ? ' active' : ''));
  allBtn.textContent = 'All Assets';
  allBtn.onclick = () => { S.filterStage = 'ALL'; render(); };
  filters.appendChild(allBtn);
  
  STAGES.forEach(st => {
    const btn = mk('button', 'status-pill' + (S.filterStage === st.id ? ' active' : ''));
    btn.textContent = st.label;
    btn.onclick = () => { S.filterStage = st.id; render(); };
    filters.appendChild(btn);
  });
  shell.appendChild(filters);

  // 3. Asset List (Vertical)
  const list = mk('div', 'asset-vertical-list');
  let visible = S.assets.filter(a => !a.softDeleted && (S.filterStage === 'ALL' || a.stage === S.filterStage));
  
  if(!visible.length) {
    const empty = mk('div', 'empty-state');
    empty.innerHTML = `<div class="empty-icon">📂</div><div class="empty-title">No assets found</div>`;
    list.appendChild(empty);
  } else {
    // Hero Card (Top most recent)
    const heroAsset = visible[0];
    const hero = mk('div', 'asset-hero-card');
    hero.onclick = () => openAsset(heroAsset);
    
    const banner = mk('div', 'hero-banner');
    if(heroAsset.thumbnailUrl) {
      banner.style.backgroundImage = `url(${heroAsset.thumbnailUrl})`;
    } else {
      banner.innerHTML = `<div class="hero-placeholder">${heroAsset.type === 'VIDEO' ? ICONS.layout : ICONS.folder}</div>`;
    }
    
    const badge = mk('div', 'hero-badge');
    badge.textContent = stageById(heroAsset.stage).label;
    badge.style.background = stageById(heroAsset.stage).color + 'cc';
    banner.appendChild(badge);
    
    const hInfo = mk('div', 'hero-info');
    hInfo.innerHTML = `<div class="hero-title">${heroAsset.title}</div><div class="hero-meta">${ago(heroAsset.updatedAt)}</div>`;
    
    hero.append(banner, hInfo);
    list.appendChild(hero);

    // Remaining items as smaller cards
    visible.slice(1).forEach(asset => {
      const card = mk('div', 'asset-card-p');
      card.onclick = () => openAsset(asset);
      
      const thumb = mk('div', 'card-thumb');
      if(asset.thumbnailUrl) thumb.style.backgroundImage = `url(${asset.thumbnailUrl})`;
      
      const cInfo = mk('div', 'card-info');
      cInfo.innerHTML = `<div class="card-title">${asset.title}</div><div class="card-meta">${stageById(asset.stage).label} • ${ago(asset.updatedAt)}</div>`;
      
      const cRight = mk('div', 'card-right');
      cRight.innerHTML = ICONS.chevron_right;
      
      card.append(thumb, cInfo, cRight);
      list.appendChild(card);
    });
  }

  shell.appendChild(list);
  main.appendChild(shell);
}

function renderTable(container,visibleAssets){
  const wrap=mk('div','table-view page-enter');
  if(!visibleAssets.length){const em=mk('div','empty-state');em.innerHTML='<div class="empty-icon">📋</div><div class="empty-title">No assets found</div><div class="empty-sub">Try a different filter or search</div>';wrap.appendChild(em);container.appendChild(wrap);return;}
  const table=mk('table','data-table');
  const thead=mk('thead');
  thead.innerHTML='<tr><th>Title</th><th>Stage</th><th>Platform</th><th>Campaign</th><th>Assignees</th><th>Due</th><th>Version</th><th>Updated</th></tr>';
  table.appendChild(thead);
  const tbody=mk('tbody');
  visibleAssets.forEach(asset=>{
    const tr=mk('tr');
    const td=(content,cls='')=>{const d=mk('td',cls);if(typeof content==='string')d.textContent=content;else if(content)d.appendChild(content);tr.appendChild(d);};
    const titleDiv=mk('div');titleDiv.style.cssText='font-weight:500;color:var(--text-primary);font-size:12.5px';titleDiv.textContent=asset.title;td(titleDiv);
    td(stageBadge(asset.stage));
    const plat=PLATFORMS.find(p=>p.id===asset.platform);
    const platSpan=mk('span');if(plat){platSpan.style.cssText=`color:${plat.color};font-size:12px;font-weight:600`;platSpan.textContent=plat.emoji+' '+plat.label;}td(platSpan);
    const camp=S.campaigns.find(c=>c.id===asset.campaignId);
    const campEl=mk('span');campEl.style.cssText='font-size:11px;color:var(--text-muted)';campEl.textContent=camp?.name||'—';td(campEl);
    const avRow=mk('div');avRow.style.cssText='display:flex;gap:2px';
    (asset.assignees||[]).slice(0,3).forEach(uid=>{const m=S.members.find(x=>x.uid===uid);if(m)avRow.appendChild(avatarEl(m.uid,m.displayName,20));});
    td(avRow);
    const days=daysUntil(asset.dueDate);
    const dueSpan=mk('span');dueSpan.style.fontFamily='var(--mono)';dueSpan.style.fontSize='11px';
    if(days!=null){dueSpan.textContent=days<0?Math.abs(days)+'d late':days===0?'Today':days+'d';dueSpan.style.color=days<0?'var(--red)':days<=3?'var(--amber)':'var(--text-secondary)';}else dueSpan.textContent='—';
    td(dueSpan);

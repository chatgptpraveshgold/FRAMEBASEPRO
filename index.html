    tr.addEventListener('click',()=>openAsset(asset));tbody.appendChild(tr);
  });
  table.appendChild(tbody);wrap.appendChild(table);container.appendChild(wrap);
}

/* ╔══════════════════════════════════════════════════════╗
   ║   RENDER — ASSET DETAIL                             ║
   ╚══════════════════════════════════════════════════════╝ */
function renderDetail(main){
  const asset=S.selectedAsset;if(!asset)return;
  const shell=mk('div','detail-shell');
  const detailMain=mk('div','detail-main');

  // Topbar
  const tb=mk('div','topbar');
  const mb=mk('button','mobile-menu-btn');mb.innerHTML=ICON('<polyline points="15 18 9 12 15 6"/>',20,2);mb.addEventListener('click',()=>navigate('kanban'));tb.appendChild(mb);
  const back=mk('button','tb-back');back.innerHTML=ICONS.arrow_left+'<span>Assets</span>';back.addEventListener('click',()=>navigate('kanban'));tb.appendChild(back);

  // Pipeline track
  const pipeTrack=mk('div','pipeline-track');
  const curIdx=STAGES.findIndex(s=>s.id===asset.stage);
  STAGES.forEach((st,i)=>{
    if(i>0){const arr=mk('span','pipe-arrow');arr.textContent='›';pipeTrack.appendChild(arr);}
    const step=mk('div','pipe-step');
    const dot=mk('span');dot.style.cssText=`width:5px;height:5px;border-radius:50%;background:${st.color};display:inline-block;flex-shrink:0`;
    step.appendChild(dot);
    const lbl=mk('span');lbl.textContent=st.label;step.appendChild(lbl);
    if(i<curIdx)step.classList.add('done');
    else if(i===curIdx){step.classList.add('current');step.style.cssText=`background:${st.color}18;color:${st.color};border-color:${st.color}33`;}
    else step.classList.add('upcoming');
    pipeTrack.appendChild(step);
  });

  tb.appendChild(pipeTrack);
  const right=mk('div','tb-right');

  if(curIdx<STAGES.length-1&&ADMINS.includes(S.member?.role)){
    const nextSt=STAGES[curIdx+1];
    const advBtn=mk('button','btn btn-primary btn-sm');advBtn.textContent='→ '+nextSt.label;
    advBtn.addEventListener('click',async()=>{
      await updateDoc(doc(db,'workspaces',S.activeWs,'assets',asset.id),{stage:nextSt.id,updatedAt:serverTimestamp()});
      S.selectedAsset={...asset,stage:nextSt.id};
      pushNotification(asset.assignees||[],`"${asset.title}" moved to ${nextSt.label}`,asset.id);
      syncToSheets('STAGE_CHANGE',{assetId:asset.id,title:asset.title,newStage:nextSt.label});
      showToast('Moved to '+nextSt.label,'var(--green)');render();
    });right.appendChild(advBtn);
  }
  if((EDITORS.includes(S.member?.role)||S.member?.role==='ADMIN')&&(asset.stage==='raw'||asset.stage==='editing')){
    const nvBtn=mk('button','btn btn-ghost btn-sm');nvBtn.innerHTML=ICONS.upload+' New Version';
    nvBtn.addEventListener('click',()=>showUploadModal(asset.id,asset.latestVersionNumber||1,asset.stage));right.appendChild(nvBtn);
  }
  if(S.member?.role==='ADMIN'||S.member?.role==='MANAGER'){
    const delBtn=mk('button','btn btn-danger btn-sm');delBtn.innerHTML=ICONS.trash;
    delBtn.addEventListener('click',()=>showDeleteModal(asset.id));right.appendChild(delBtn);
  }
  tb.appendChild(right);
  detailMain.appendChild(tb);

  // Body
  const body=mk('div','detail-body');

  // Preview zone
  const pz=mk('div','preview-zone');
  const pc=mk('div','preview-container');
  // On mobile: use 16:9 aspect ratio instead of flex:1
  if(window.innerWidth<768){
    pc.style.cssText='position:relative;width:100%;padding-top:56.25%;border-radius:var(--r-lg);overflow:hidden;background:#000;border:1px solid var(--border-subtle)';
    const inner=mk('div');inner.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center';
    if(asset.cloudinaryUrl&&(asset.type==='IMAGE'||asset.thumbnailUrl)){
      const img=mk('img');img.src=asset.thumbnailUrl||asset.cloudinaryUrl;img.style.cssText='width:100%;height:100%;object-fit:contain';inner.appendChild(img);
    }else if(asset.cloudinaryUrl&&asset.type==='VIDEO'){
      const vid=document.createElement('video');vid.src=asset.cloudinaryUrl;vid.style.cssText='width:100%;height:100%;object-fit:contain;background:#000';vid.controls=false;vid.id='preview-vid';vid.preload='metadata';vid.crossOrigin='anonymous';vid.playsInline=true;
      vid.addEventListener('loadedmetadata',()=>{S.duration=vid.duration||60;const td=qs('#timecode');if(td)td.textContent=fmt(0)+' / '+fmt(S.duration);const sc=qs('#scrub');if(sc){sc.max=100;sc.value=0;}});
      vid.addEventListener('timeupdate',()=>{S.currentTime=vid.currentTime;const pct=S.duration>0?(vid.currentTime/S.duration)*100:0;const sc=qs('#scrub');if(sc)sc.value=pct;const td=qs('#timecode');if(td)td.textContent=fmt(vid.currentTime)+' / '+fmt(S.duration);});
      vid.addEventListener('ended',()=>{S.isPlaying=false;const pb=qs('#pb');if(pb)pb.innerHTML=PLAY_SVG;});
      inner.appendChild(vid);
    }else{
      const ph=mk('div','preview-placeholder');
      ph.innerHTML=`<div class="preview-placeholder-icon">${asset.type==='VIDEO'?'🎬':asset.type==='IMAGE'?'🖼️':asset.type==='AUDIO'?'🎵':'📄'}</div><div style="font-size:13px;font-weight:600;font-family:var(--font-display);color:var(--text-secondary);margin-top:8px">${asset.title}</div>`;
      inner.appendChild(ph);
    }
    pc.appendChild(inner);
    pz.appendChild(pc);
  }else{
    if(asset.cloudinaryUrl&&(asset.type==='IMAGE'||asset.thumbnailUrl)){
      const img=mk('img');img.src=asset.thumbnailUrl||asset.cloudinaryUrl;img.style.cssText='max-width:100%;max-height:100%;object-fit:contain;border-radius:8px';pc.appendChild(img);
    }else if(asset.cloudinaryUrl&&asset.type==='VIDEO'){
      const vid=document.createElement('video');vid.src=asset.cloudinaryUrl;vid.style.cssText='max-width:100%;max-height:100%;border-radius:8px;background:#000';vid.controls=false;vid.id='preview-vid';vid.preload='metadata';vid.crossOrigin='anonymous';vid.playsInline=true;
      vid.addEventListener('loadedmetadata',()=>{S.duration=vid.duration||60;const td=qs('#timecode');if(td)td.textContent=fmt(0)+' / '+fmt(S.duration);const sc=qs('#scrub');if(sc){sc.max=100;sc.value=0;}});
      vid.addEventListener('timeupdate',()=>{S.currentTime=vid.currentTime;const pct=S.duration>0?(vid.currentTime/S.duration)*100:0;const sc=qs('#scrub');if(sc)sc.value=pct;const td=qs('#timecode');if(td)td.textContent=fmt(vid.currentTime)+' / '+fmt(S.duration);});
      vid.addEventListener('ended',()=>{S.isPlaying=false;const pb=qs('#pb');if(pb)pb.innerHTML=PLAY_SVG;});
      pc.appendChild(vid);
    }else{
      const ph=mk('div','preview-placeholder');
      ph.innerHTML=`<div class="preview-placeholder-icon">${asset.type==='VIDEO'?'🎬':asset.type==='IMAGE'?'🖼️':asset.type==='AUDIO'?'🎵':'📄'}</div><div style="font-size:13px;font-weight:600;font-family:var(--font-display);color:var(--text-secondary)">${asset.title}</div><div style="font-size:11.5px;margin-top:4px">No preview available</div>`;
      pc.appendChild(ph);
    }
    pz.appendChild(pc);
  }

  // Video controls (only show for video)
  if(asset.type==='VIDEO'){
    const vc=mk('div','video-controls');
    const pb=mk('button','play-btn');pb.id='pb';pb.innerHTML=PLAY_SVG;
    pb.addEventListener('click',togglePlay);

    const scrub=mk('input','scrub-bar');scrub.type='range';scrub.id='scrub';scrub.min=0;scrub.max=100;scrub.value=(S.currentTime/Math.max(S.duration,1))*100;
    scrub.addEventListener('input',e=>{const t=(e.target.value/100)*S.duration;S.currentTime=t;const vid=qs('#preview-vid');if(vid)vid.currentTime=t;const td=qs('#timecode');if(td)td.textContent=fmt(t)+' / '+fmt(S.duration);});

    const timecode=mk('span','timecode');timecode.id='timecode';timecode.textContent=fmt(S.currentTime)+' / '+fmt(S.duration);

    const tsBtn=mk('button','ts-capture-btn');tsBtn.id='ts-btn';tsBtn.innerHTML=ICON('<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',13)+' Mark';
    tsBtn.addEventListener('click',()=>{tsBtn.classList.toggle('active');tsBtn.textContent=tsBtn.classList.contains('active')?fmt(S.currentTime)+' ×':'Mark';});

    vc.append(pb,scrub,timecode,tsBtn);pz.appendChild(vc);
  } else {
    // Spacer for image previews so it looks balanced
    pz.style.paddingBottom = "16px";
  }
  body.appendChild(pz);

  // Context panel — always show on mobile, use showContextPanel for desktop
  const isMobile=window.innerWidth<768;
  const showCtx=isMobile?true:S.showContextPanel;
  const ctx=mk('div','context-panel'+(showCtx?'':' hidden'));
  const ctxHdr=mk('div','ctx-header');
  // On mobile: add a drag handle area
  if(isMobile){
    const handle=mk('div');handle.style.cssText='width:36px;height:4px;border-radius:2px;background:var(--border-strong);margin:0 auto 8px;flex-shrink:0';
    ctx.insertBefore(handle,ctx.firstChild);
  }
  ['Comments','Info','Versions'].forEach(tab=>{
    const t=mk('button','ctx-tab'+(S.detailTab===tab.toLowerCase()?' active':''));
    t.textContent=tab;t.addEventListener('click',()=>{S.detailTab=tab.toLowerCase();render();});ctxHdr.appendChild(t);
  });
  ctx.appendChild(ctxHdr);

  const ctxBody=mk('div','ctx-body');
  if(S.detailTab==='comments')renderComments(ctxBody,asset);
  else if(S.detailTab==='info')renderInfoPanel(ctxBody,asset);
  else if(S.detailTab==='versions')renderVersionsPanel(ctxBody,asset);
  ctx.appendChild(ctxBody);
  body.appendChild(ctx);

  detailMain.appendChild(body);
  shell.appendChild(detailMain);
  main.appendChild(shell);
}

function renderVersionsPanel(container,asset){
  const wrap=mk('div');wrap.style.cssText='padding:12px;overflow-y:auto;flex:1';
  const title=mk('div');title.style.cssText='font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-family:var(--font-display);margin-bottom:10px';title.textContent='Version History';
  wrap.appendChild(title);

  if(!asset.latestVersionNumber){
    wrap.innerHTML+='<div class="empty-state" style="padding:24px 10px"><div class="empty-icon">📦</div><div class="empty-title">No versions yet</div><div class="empty-sub">Upload the first version to track history</div></div>';
    container.appendChild(wrap);return;
  }

  for(let i=asset.latestVersionNumber;i>=1;i--){
    const row=mk('div');row.style.cssText='display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:var(--r-md);margin-bottom:6px';
    const num=mk('div');num.style.cssText='width:28px;height:28px;border-radius:6px;background:var(--bg-floating);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--mono);color:var(--text-secondary);flex-shrink:0';num.textContent='v'+i;
    const info=mk('div');info.style.flex='1';
    const lbl=mk('div');lbl.style.cssText='font-size:12px;font-weight:500;color:var(--text-primary);font-family:var(--font-display)';lbl.textContent=i===asset.latestVersionNumber?'Current version':'Previous version';
    const sub=mk('div');sub.style.cssText='font-size:10.5px;color:var(--text-muted);margin-top:2px';sub.textContent=i===asset.latestVersionNumber&&asset.cloudinaryUrl?'Available':'Archived';
    info.append(lbl,sub);row.append(num,info);
    if(i===asset.latestVersionNumber&&asset.cloudinaryUrl){
      const dl=mk('a','btn btn-ghost btn-xs');dl.href=asset.cloudinaryUrl;dl.target='_blank';dl.innerHTML=ICON('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',12);row.appendChild(dl);
    }
    wrap.appendChild(row);
  }
  container.appendChild(wrap);
}

function renderComments(container,asset){
  const listWrap=mk('div','cmt-list');listWrap.id='cmt-list';
  listWrap.innerHTML='<div class="empty-state" style="padding:24px 12px"><div class="empty-icon">💬</div><div class="empty-title">No comments yet</div><div class="empty-sub">Be the first to leave feedback</div></div>';
  container.appendChild(listWrap);

  // Compose area
  const comp=mk('div','cmt-compose');
  const isAdmin=ADMINS.includes(S.member?.role);

  // Review templates
  if(isAdmin){
    const tplRow=mk('div','review-templates');
    let selTemplate=null;
    const advStages=STAGES.filter(s=>s.id!=='raw'&&s.id!=='editing');
    advStages.forEach(st=>{
      const tpl=mk('div','review-tpl');
      tpl.textContent='→ '+st.label;tpl.style.borderColor=st.color+'33';tpl.style.color=st.color;
      tpl.addEventListener('click',()=>{
        if(selTemplate===st.id){selTemplate=null;tpl.classList.remove('selected');tpl.style.background='';}
        else{
          tplRow.querySelectorAll('.review-tpl').forEach(t=>{t.classList.remove('selected');t.style.background='';});
          selTemplate=st.id;tpl.classList.add('selected');tpl.style.background=st.color+'18';
        }
        window._selTemplate=selTemplate;
      });tplRow.appendChild(tpl);
    });
    window._selTemplate=null;
    comp.appendChild(tplRow);
  }

  // Timestamp row
  const tsRow=mk('div');tsRow.id='ts-row';tsRow.style.cssText='display:flex;align-items:center;gap:6px;padding:5px 0;display:none';
  const tslbl=mk('span');tslbl.id='ts-lbl';tslbl.style.cssText='font-size:11px;color:var(--text-muted)';tslbl.textContent='Timestamp:';
  const tsval=mk('span');tsval.id='ts-val';tsval.style.cssText='font-size:11px;font-family:var(--mono);color:var(--blue)';
  tsRow.append(tslbl,tsval);comp.appendChild(tsRow);

  const inputWrap=mk('div');inputWrap.style.position='relative';
  const textarea=mk('textarea');textarea.placeholder=isAdmin?'Leave review feedback…':'Add a comment…';
  textarea.style.cssText='min-height:64px;font-size:12.5px;resize:none;margin:0;border-radius:var(--r-md)';

  // Capture timestamp from player
  let capturedTs=null;
  const capBtn=qs('#ts-btn');
  if(capBtn&&capBtn.classList.contains('active')){
    capturedTs=S.currentTime;
    const tsr=qs('#ts-row');if(tsr){tsr.style.display='flex';}
    const tsv=qs('#ts-val');if(tsv)tsv.textContent=fmt(capturedTs);
  }

  // @mention
  const mentionDrop=mk('div','mention-drop');
  let mentionStart=-1;
  textarea.addEventListener('input',()=>{
    const val=textarea.value;const cur=textarea.selectionStart;
    const atIdx=val.lastIndexOf('@',cur-1);
    if(atIdx>=0&&(atIdx===0||/\s/.test(val[atIdx-1]))){
      mentionStart=atIdx;const q=val.slice(atIdx+1,cur).toLowerCase();
      const matches=S.members.filter(m=>m.displayName.toLowerCase().includes(q));
      mentionDrop.innerHTML='';
      if(matches.length){
        matches.forEach(m=>{
          const item=mk('div','mention-item');item.innerHTML=`<span style="font-weight:600">${m.displayName}</span> <span style="font-size:10.5px;color:var(--text-muted)">${ROLE_META[m.role]?.label||m.role}</span>`;
          item.addEventListener('click',()=>{
            const before=val.slice(0,mentionStart);const after=val.slice(cur);
            textarea.value=before+'@'+m.displayName+' '+after;mentionDrop.classList.remove('open');mentionStart=-1;
          });mentionDrop.appendChild(item);
        });mentionDrop.classList.add('open');
      }else mentionDrop.classList.remove('open');
    }else{mentionDrop.classList.remove('open');mentionStart=-1;}
  });
  textarea.addEventListener('blur',()=>setTimeout(()=>mentionDrop.classList.remove('open'),150));
  inputWrap.append(textarea,mentionDrop);comp.appendChild(inputWrap);

  const submitBtn=mk('button','btn btn-primary');submitBtn.style.cssText='width:100%;justify-content:center;font-size:12px';
  submitBtn.textContent=isAdmin?'Submit Review':'Post Comment';
  submitBtn.addEventListener('click',async()=>{
    const selTemplate=window._selTemplate;
    if(isAdmin&&!selTemplate&&!textarea.value.trim()){showToast('Select a stage or write a comment','var(--amber)');return;}
    if(!textarea.value.trim()){showToast('Comment is empty','var(--amber)');return;}
    submitBtn.disabled=true;submitBtn.textContent='Posting…';
    const mentioned=[...textarea.value.matchAll(/@([\w ]+?)(?=\s|$|@)/g)].map(m=>m[1].trim());
    const mentionedUids=S.members.filter(m=>mentioned.includes(m.displayName)).map(m=>m.uid);
    const tsCapture=qs('#ts-btn')?.classList.contains('active')?S.currentTime:null;
    try{
      await addDoc(collection(db,'workspaces',S.activeWs,'assets',asset.id,'comments'),{
        assetId:asset.id,versionId:asset.latestVersionId||'v1',
        authorUid:S.authUser.uid,authorName:S.member?.displayName||S.authUser.email,
        templateType:isAdmin?(selTemplate||null):null,
        body:textarea.value.trim(),videoTimestampSeconds:tsCapture??null,
        mentions:mentionedUids,createdAt:serverTimestamp()
      });
      if(selTemplate){
        await updateDoc(doc(db,'workspaces',S.activeWs,'assets',asset.id),{stage:selTemplate,updatedAt:serverTimestamp()});
        S.selectedAsset={...asset,stage:selTemplate};
        pushNotification(asset.assignees||[],`"${asset.title}" → ${stageById(selTemplate).label}`,asset.id);
        syncToSheets('STAGE_CHANGE',{assetId:asset.id,title:asset.title,newStage:stageById(selTemplate).label});
      }
      if(mentionedUids.length)pushNotification(mentionedUids,`${S.member?.displayName} mentioned you in "${asset.title}"`,asset.id);
      textarea.value='';capturedTs=null;window._selTemplate=null;
      const capBtn2=qs('#ts-btn');if(capBtn2){capBtn2.classList.remove('active');capBtn2.innerHTML=ICON('<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',13)+' Mark';}
      showToast('Comment posted','var(--green)');
    }catch(e){showToast('Error: '+e.message,'var(--red)');}
    submitBtn.disabled=false;submitBtn.textContent=isAdmin?'Submit Review':'Post Comment';
  });
  comp.appendChild(submitBtn);container.appendChild(comp);

  // Real-time listener
  if(S.cmtUnsub){S.cmtUnsub();S.cmtUnsub=null;}
  S.cmtUnsub=listenComments(asset.id,comments=>{
    const cl=qs('#cmt-list');if(!cl)return;cl.innerHTML='';
    if(!comments.length){cl.innerHTML='<div class="empty-state" style="padding:24px 12px"><div class="empty-icon">💬</div><div class="empty-title">No comments yet</div><div class="empty-sub">Be the first to leave feedback</div></div>';return;}
    const sorted=[...comments].sort((a,b)=>{
      if(a.videoTimestampSeconds!=null&&b.videoTimestampSeconds!=null)return a.videoTimestampSeconds-b.videoTimestampSeconds;
      return(a.createdAt?.toDate?.()?.getTime()||0)-(b.createdAt?.toDate?.()?.getTime()||0);
    });
    sorted.forEach(c=>{
      const item=mk('div','cmt-item');
      const hdr=mk('div','cmt-header');
      hdr.appendChild(avatarEl(c.authorUid||'',c.authorName||'User',20));
      const auth=mk('span','cmt-author');auth.textContent=c.authorName||'User';
      const tm=mk('span','cmt-time');tm.textContent=ago(c.createdAt);
      hdr.append(auth,tm);item.appendChild(hdr);
      if(c.videoTimestampSeconds!=null){
        const tc=mk('button','ts-chip');tc.textContent='⏱ '+fmt(c.videoTimestampSeconds);
        tc.addEventListener('click',()=>seekTo(c.videoTimestampSeconds));item.appendChild(tc);
      }
      if(c.templateType){const sb=mk('span','badge');sb.style.cssText=`color:${stageById(c.templateType).color};background:${stageById(c.templateType).color}18;margin-bottom:4px;display:inline-flex`;sb.textContent='→ '+stageById(c.templateType).label;item.appendChild(sb);}
      const body=mk('div','cmt-body');
      const parts=(c.body||'').split(/(@\w[\w ]*)/g);
      parts.forEach(p=>{if(p.startsWith('@')){const m=mk('span','mention');m.textContent=p;body.appendChild(m);}else body.appendChild(document.createTextNode(p));});
      item.appendChild(body);cl.appendChild(item);
    });
  });
}

function renderInfoPanel(container,asset){
  const info=mk('div','info-panel');
  function row(label,val){
    const r=mk('div','info-row');
    const l=mk('div','info-label');l.textContent=label;r.appendChild(l);
    if(typeof val==='string'){const v=mk('div','info-val');v.textContent=val||'—';r.appendChild(v);}
    else if(val){r.appendChild(val);}
    info.appendChild(r);
  }

  const sectionTitle=label=>{const t=mk('div','info-section-title');t.textContent=label;info.appendChild(t);}

  sectionTitle('Asset Details');
  row('Title',asset.title);

  const stageEl=mk('div');stageEl.appendChild(stageBadge(asset.stage));row('Current Stage',stageEl);
  const stageSel=document.createElement('select');stageSel.className='field-input';
  STAGES.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.label;if(s.id===asset.stage)o.selected=true;stageSel.appendChild(o);});
  stageSel.addEventListener('change',async e=>{
    await updateDoc(doc(db,'workspaces',S.activeWs,'assets',asset.id),{stage:e.target.value,updatedAt:serverTimestamp()});
    syncToSheets('STAGE_CHANGE',{assetId:asset.id,title:asset.title,newStage:stageById(e.target.value).label});
    S.selectedAsset={...asset,stage:e.target.value};showToast('Stage updated');render();
  });
  row('Move to Stage',stageSel);

  const platWrap=mk('div');platWrap.style.cssText='display:flex;gap:4px;flex-wrap:wrap';
  PLATFORMS.forEach(p=>{
    const b=mk('button','btn btn-ghost btn-xs');b.textContent=p.emoji+' '+p.label;
    if(asset.platform===p.id)b.style.cssText=`border-color:${p.color}44;color:${p.color};background:${p.color}14`;
    b.addEventListener('click',async()=>{await updateDoc(doc(db,'workspaces',S.activeWs,'assets',asset.id),{platform:p.id,updatedAt:serverTimestamp()});S.selectedAsset={...asset,platform:p.id};showToast('Platform updated');render();});
    platWrap.appendChild(b);
  });row('Platform',platWrap);

  sectionTitle('Scheduling');
  const campSel=document.createElement('select');campSel.className='field-input';
  const noneOpt=document.createElement('option');noneOpt.value='';noneOpt.textContent='No campaign';campSel.appendChild(noneOpt);
  S.campaigns.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.name;if(c.id===asset.campaignId)o.selected=true;campSel.appendChild(o);});
  campSel.addEventListener('change',async e=>{await updateDoc(doc(db,'workspaces',S.activeWs,'assets',asset.id),{campaignId:e.target.value||null,updatedAt:serverTimestamp()});showToast('Campaign updated');});
  row('Campaign',campSel);

  const dueDateInp=mk('input','field-input');dueDateInp.type='date';dueDateInp.value=asset.dueDate||'';
  dueDateInp.addEventListener('change',async e=>{await updateDoc(doc(db,'workspaces',S.activeWs,'assets',asset.id),{dueDate:e.target.value,updatedAt:serverTimestamp()});showToast('Due date saved');});
  row('Due Date',dueDateInp);

  const postDateInp=mk('input','field-input');postDateInp.type='date';postDateInp.value=asset.contentDate||'';
  postDateInp.addEventListener('change',async e=>{await updateDoc(doc(db,'workspaces',S.activeWs,'assets',asset.id),{contentDate:e.target.value,updatedAt:serverTimestamp()});showToast('Post date saved');});
  row('Post Date',postDateInp);

  sectionTitle('People');
  const asgWrap=mk('div');
  const chips=mk('div','assignee-chips');
  (asset.assignees||[]).forEach(uid=>{
    const m=S.members.find(x=>x.uid===uid);if(!m)return;
    const chip=mk('div','asgn-chip');chip.appendChild(avatarEl(m.uid,m.displayName,16));
    const n=mk('span');n.style.fontSize='11.5px';n.textContent=m.displayName;chip.appendChild(n);
    if(ADMINS.includes(S.member?.role)){
      const rm=mk('button','chip-rm');rm.textContent='×';
      rm.addEventListener('click',async()=>{const newA=(asset.assignees||[]).filter(a=>a!==uid);await updateDoc(doc(db,'workspaces',S.activeWs,'assets',asset.id),{assignees:newA,updatedAt:serverTimestamp()});S.selectedAsset={...asset,assignees:newA};render();});
      chip.appendChild(rm);
    }chips.appendChild(chip);
  });
  asgWrap.appendChild(chips);
  if(ADMINS.includes(S.member?.role)){
    const addSel=document.createElement('select');addSel.className='field-input';addSel.style.marginTop='5px';
    const defOpt=document.createElement('option');defOpt.textContent='+ Assign member…';defOpt.value='';addSel.appendChild(defOpt);
    S.members.filter(m=>!(asset.assignees||[]).includes(m.uid)).forEach(m=>{
      const o=document.createElement('option');o.value=m.uid;o.textContent=m.displayName+' ('+( ROLE_META[m.role]?.label||m.role)+')';addSel.appendChild(o);
    });
    addSel.addEventListener('change',async e=>{
      if(!e.target.value)return;
      const newA=[...(asset.assignees||[]),e.target.value];
      await updateDoc(doc(db,'workspaces',S.activeWs,'assets',asset.id),{assignees:newA,updatedAt:serverTimestamp()});
      S.selectedAsset={...asset,assignees:newA};pushNotification([e.target.value],`You were assigned to "${asset.title}"`,asset.id);
      render();showToast('Member assigned');
    });asgWrap.appendChild(addSel);
  }
  row('Assignees',asgWrap);

  sectionTitle('File');
  if(asset.cloudinaryUrl){const dl=mk('a','btn btn-ghost btn-sm');dl.href=asset.cloudinaryUrl;dl.target='_blank';dl.innerHTML=ICON('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',12)+' Download';row('Download',dl);}
  if(asset.latestVersionNumber)row('Latest Version','v'+asset.latestVersionNumber);
  row('Last Updated',ago(asset.updatedAt));

  container.appendChild(info);
}

/* ╔══════════════════════════════════════════════════════╗
   ║   RENDER — UPLOAD CENTER                            ║
   ╚══════════════════════════════════════════════════════╝ */
function renderUploadCenter(main){
  const uc=mk('div','upload-center');
  uc.appendChild(makeTopbar('Upload Center','Add new assets',right=>{
    const clrBtn=mk('button','btn btn-ghost btn-sm');clrBtn.textContent='Clear queue';
    clrBtn.addEventListener('click',()=>{S.uploadQueue=[];render();});right.appendChild(clrBtn);
  }));
  const body=mk('div','uc-body page-enter');

  // Drop zone
  const dropZone=mk('div','drop-zone');
  const fileInput=mk('input');fileInput.type='file';fileInput.multiple=true;fileInput.accept='video/*,image/*,audio/*';fileInput.style.display='none';
  dropZone.innerHTML='<div class="drop-zone-icon">⬆</div><div class="drop-zone-title">Drop files here or click to browse</div><div class="drop-zone-sub">Video, Image, Audio — up to 500MB per file</div>';
  dropZone.addEventListener('click',()=>fileInput.click());
  dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag');});
  dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag'));
  dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag');addToQueue([...e.dataTransfer.files]);});
  fileInput.addEventListener('change',e=>addToQueue([...e.target.files]));
  body.append(dropZone,fileInput);

  // Config
  const cfg=mk('div','upload-config');
  const cfgTitle=mk('div');cfgTitle.style.cssText='font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:14px';cfgTitle.textContent='Upload Settings';cfg.appendChild(cfgTitle);
  [{label:'Asset Title (optional)',id:'uc-title',type:'text',placeholder:'Leave blank to use filename'},
   {label:'Target Stage',id:'uc-stage',type:'select',options:STAGES.filter(s=>s.uploadable)},
   {label:'Platform',id:'uc-plat',type:'select',options:PLATFORMS},
   {label:'Campaign (optional)',id:'uc-camp',type:'select',options:[{id:'',label:'No campaign'},...S.campaigns]},
  ].forEach(f=>{
    const wrap=mk('div');
    const lbl=mk('div','uc-field-label');lbl.textContent=f.label;wrap.appendChild(lbl);
    let inp;
    if(f.type==='select'){
      inp=document.createElement('select');inp.id=f.id;inp.className='field-input';inp.style.width='100%';
      f.options.forEach(o=>{const opt=document.createElement('option');opt.value=o.id;opt.textContent=o.label||o.name;inp.appendChild(opt);});
    }else{
      inp=mk('input','field-input');inp.id=f.id;inp.type=f.type;inp.placeholder=f.placeholder||'';inp.style.width='100%';
    }
    wrap.appendChild(inp);cfg.appendChild(wrap);
  });
  body.appendChild(cfg);

  // Queue
  if(S.uploadQueue.length){
    const qHdr=mk('div','upload-queue-header');
    const qt=mk('div','queue-title');qt.textContent='Queue ('+S.uploadQueue.length+' files)';
    const startBtn=mk('button','btn btn-primary btn-sm');startBtn.textContent='Start All';
    startBtn.addEventListener('click',()=>startUploads());
    qHdr.append(qt,startBtn);body.appendChild(qHdr);
    const queue=mk('div','upload-queue');
    S.uploadQueue.forEach((item,idx)=>{
      const qi=mk('div','queue-item');qi.id='qi-'+idx;
      const qiHdr=mk('div','qi-header');
      const fn=mk('div','qi-filename');fn.textContent=item.file.name;
      const sz=mk('span','qi-size');sz.textContent=fmtBytes(item.file.size);
      const st=mk('span','qi-status '+item.status);st.id='qi-status-'+idx;st.textContent=item.status;
      const cancel=mk('button','qi-cancel');cancel.textContent='×';cancel.title='Remove';
      cancel.addEventListener('click',()=>{S.uploadQueue.splice(idx,1);render();});
      qiHdr.append(fn,sz,st,cancel);qi.appendChild(qiHdr);
      const pb2=mk('div','progress-bar');const pf=mk('div','progress-fill');pf.id='qi-prog-'+idx;pf.style.width=(item.progress||0)+'%';pb2.appendChild(pf);qi.appendChild(pb2);
      queue.appendChild(qi);
    });
    body.appendChild(queue);
  }
  uc.appendChild(body);main.appendChild(uc);

  function addToQueue(files){
    files.forEach(f=>{if(f.size>500*1024*1024){showToast(f.name+' exceeds 500MB','var(--red)');return;}S.uploadQueue.push({file:f,status:'queued',progress:0});});render();
  }
  async function startUploads(){
    const stageId=qs('#uc-stage')?.value||'raw';const platId=qs('#uc-plat')?.value||'youtube';const campId=qs('#uc-camp')?.value||null;const baseTitle=qs('#uc-title')?.value?.trim()||'';
    for(let i=0;i<S.uploadQueue.length;i++){
      const item=S.uploadQueue[i];if(item.status==='done'||item.status==='uploading')continue;
      item.status='uploading';const stEl=qs('#qi-status-'+i);if(stEl){stEl.className='qi-status uploading';stEl.textContent='uploading…';}
      try{
        const assetTitle=baseTitle||item.file.name.replace(/\.[^/.]+$/,'');
        const result=await uploadToCloudinary(item.file,pct=>{item.progress=pct;const pf=qs('#qi-prog-'+i);if(pf)pf.style.width=pct+'%';});
        const assetRef=doc(collection(db,'workspaces',S.activeWs,'assets'));const assetId=assetRef.id;
        const versionRef=doc(collection(db,'workspaces',S.activeWs,'assets',assetId,'versions'));
        await setDoc(versionRef,{assetId,versionId:versionRef.id,state:'READY',originalFilename:item.file.name,contentType:item.file.type,bytes:item.file.size,cloudinaryUrl:result.secure_url,cloudinaryPublicId:result.public_id,createdByUid:S.authUser.uid,createdAt:serverTimestamp()});
        const assetType=item.file.type.startsWith('video/')?'VIDEO':item.file.type.startsWith('image/')?'IMAGE':'AUDIO';
        await setDoc(assetRef,{title:assetTitle,type:assetType,stage:stageId,platform:platId,campaignId:campId||null,cloudinaryUrl:result.secure_url,cloudinaryPublicId:result.public_id,thumbnailUrl:assetType==='IMAGE'?result.secure_url:null,caption:null,duration:result.duration||null,workspace:S.activeWs,assignees:[S.authUser.uid],createdByUid:S.authUser.uid,createdAt:serverTimestamp(),updatedAt:serverTimestamp(),latestVersionId:versionRef.id,latestVersionNumber:1,softDeleted:false});
        item.status='done';item.progress=100;
        const stEl2=qs('#qi-status-'+i);if(stEl2){stEl2.className='qi-status done';stEl2.textContent='done';}
        const pf=qs('#qi-prog-'+i);if(pf)pf.style.width='100%';
        const reviewers=S.members.filter(m=>ADMINS.includes(m.role)).map(m=>m.uid);
        pushNotification(reviewers,`${S.member?.displayName} uploaded "${assetTitle}"`,assetId);
        syncToSheets('ASSET_CREATED',{assetId,title:assetTitle,stage:stageId,platform:platId});
        showToast('Uploaded: '+assetTitle,'var(--green)');
      }catch(err){
        item.status='error';const stEl2=qs('#qi-status-'+i);if(stEl2){stEl2.className='qi-status error';stEl2.textContent='error';}
        showToast('Failed: '+item.file.name,'var(--red)');console.error('[Upload]',err);
      }
    }
  }
}

function renderCampaigns(main){

    const month=mk('div','cc-month');month.textContent=c.month||'Ongoing';nameWrap.appendChild(month);

      const actions=mk('div','cc-actions');

      editBtn.addEventListener('click',e=>{e.stopPropagation();showEditCampaignModal(c);});
      const delBtn=mk('button','btn btn-danger btn-xs');delBtn.innerHTML=ICONS.trash;delBtn.title='Delete campaign';

      actions.append(editBtn,delBtn);hdr.appendChild(actions);
    }
    card.appendChild(hdr);

    const assetsInCamp=S.assets.filter(a=>a.campaignId===c.id&&!a.softDeleted);
    const posted=assetsInCamp.filter(a=>a.stage==='posted').length;
    const inReview=assetsInCamp.filter(a=>a.stage==='review'||a.stage==='approved').length;
    const progress=assetsInCamp.length?Math.round((posted/assetsInCamp.length)*100):0;

    const stats=mk('div','cc-stats');

      const s=mk('div','cc-stat');s.innerHTML=`<strong>${v}</strong><span>${l}</span>`;stats.appendChild(s);
    });card.appendChild(stats);

    // Progress bar
    const progressWrap=mk('div','cc-progress');

    const pl2=mk('span');pl2.textContent=progress+'%';pl2.style.color=col;
    plabels.append(pl1,pl2);
    const pbar=mk('div','cc-progress-bar');
    const pfill=mk('div','cc-progress-fill');pfill.style.cssText=`width:${progress}%;background:linear-gradient(90deg,${col},${col}AA)`;
    pbar.appendChild(pfill);progressWrap.append(plabels,pbar);card.appendChild(progressWrap);

    card.addEventListener('click',()=>openCampaign(c));
    grid.appendChild(card);
  });
  content.appendChild(grid);main.appendChild(content);
}

  });

function renderNotifications(main){

function renderSheetsGuide(main){
  const shell=mk('div','sheets-guide');
  shell.appendChild(makeTopbar('Google Sheets Sync','Real-time dashboard integration',right=>{
    if(S.sheetsConnected){
      const syncBtn=mk('button','btn btn-success btn-sm');syncBtn.innerHTML=ICONS.refresh+' Sync Now';
      syncBtn.addEventListener('click',syncAllAssetsToSheets);right.appendChild(syncBtn);
    }
  }));
  const body=mk('div','guide-body page-enter');

  // Connection status
  if(S.sheetsConnected){
    const banner=mk('div','guide-connected-banner');
    banner.innerHTML=`<span style="font-size:18px">✅</span><div><strong style="color:var(--green);font-family:var(--font-display)">Connected!</strong><div style="font-size:12px;color:var(--text-secondary);margin-top:2px">Google Sheets sync is active. Changes will be pushed automatically.</div></div>`;
    const disc=mk('button','btn btn-ghost btn-sm');disc.textContent='Disconnect';disc.style.marginLeft='auto';disc.addEventListener('click',()=>{S.sheetsConnected=false;S.sheetsUrl='';showToast('Disconnected from Google Sheets');render();});
    banner.appendChild(disc);body.appendChild(banner);
  }else{
    const banner=mk('div','guide-status-banner');
    banner.innerHTML='<span style="font-size:18px">⚠️</span><div><strong style="color:var(--amber);font-family:var(--font-display)">Not Connected</strong><div style="font-size:12px;color:var(--text-secondary);margin-top:2px">Follow the steps below to connect your Google Sheet.</div></div>';
    body.appendChild(banner);
  }

  const steps=[
    {
      title:'1. Create a Google Sheet',
      desc:'Open Google Sheets and create a new spreadsheet. Name it "FrameBase Dashboard". Create a sheet called "Assets" with these column headers in row 1:',
      code:'ID | Title | Stage | Type | Platform | Campaign | Assignees | Due Date | Post Date | Version | Updated | URL'
    },
    {
      title:'2. Open Apps Script',
      desc:'In your Google Sheet, click Extensions → Apps Script. This opens the script editor.',
    },
    {
      title:'3. Paste the webhook script',
      desc:'Delete all existing code and paste the following script, then click Save (Ctrl+S):',
      code:`function doPost(e) {
  try {
    var data = JSON.parse(e.postData.contents);
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    var sheet = ss.getSheetByName('Assets') || ss.insertSheet('Assets');
    
    if (data.action === 'FULL_SYNC' && data.rows) {
      // Clear existing data (keep headers)
      if (sheet.getLastRow() > 1) sheet.deleteRows(2, sheet.getLastRow() - 1);
      data.rows.forEach(function(row) {
        sheet.appendRow([row.id, row.title, row.stage, row.type,
          row.platform, row.campaign, row.assignees,
          row.dueDate, row.postDate, row.version, row.updatedAt, row.url]);
      });
    } else if (data.action === 'STAGE_CHANGE') {
      // Update stage for existing row
      var col = 3; // Stage column
      var vals = sheet.getDataRange().getValues();
      for (var i = 1; i < vals.length; i++) {
        if (vals[i][0] === data.assetId) {
          sheet.getRange(i+1, col).setValue(data.newStage);
          break;
        }
      }
    } else if (data.action === 'ASSET_CREATED') {
      sheet.appendRow([data.assetId, data.title, data.stage, data.type||'', data.platform||'', '', '', '', '', 'v1', new Date().toISOString(), data.url||'']);
    } else if (data.action === 'ASSET_UPDATED') {
      // Real-time update: find existing row and update it, or append if new
      var vals3 = sheet.getDataRange().getValues();
      var found = false;
      for (var k = 1; k < vals3.length; k++) {
        if (vals3[k][0] === data.assetId) {
          sheet.getRange(k+1, 2).setValue(data.title||vals3[k][1]);
          sheet.getRange(k+1, 3).setValue(data.stage||vals3[k][2]);
          sheet.getRange(k+1, 4).setValue(data.type||vals3[k][3]);
          sheet.getRange(k+1, 5).setValue(data.platform||vals3[k][4]);
          sheet.getRange(k+1, 10).setValue(data.version||vals3[k][9]);
          sheet.getRange(k+1, 11).setValue(data.updatedAt||new Date().toISOString());
          if(data.url) sheet.getRange(k+1, 12).setValue(data.url);
          found = true; break;
        }
      }
      if (!found) {
        sheet.appendRow([data.assetId, data.title, data.stage, data.type||'', data.platform||'', '', '', '', '', data.version||'v1', data.updatedAt||new Date().toISOString(), data.url||'']);
      }
    } else if (data.action === 'ASSET_DELETED') {
      var vals2 = sheet.getDataRange().getValues();
      for (var j = 1; j < vals2.length; j++) {
        if (vals2[j][0] === data.assetId) {
          sheet.deleteRow(j+1);
          break;
        }
      }
    }
    return ContentService.createTextOutput(JSON.stringify({status:'ok'}))
      .setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService.createTextOutput(JSON.stringify({status:'error',message:err.message}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}`
    },
    {
      title:'4. Deploy as Web App',
      desc:'Click Deploy → New deployment. Set type to "Web app". Set "Execute as" to "Me" and "Who has access" to "Anyone". Click Deploy. Copy the Web App URL.'
    },
    {
      title:'5. Paste the URL below & connect',
      desc:'Paste your Web App URL in the field below and click Connect. Then click "Sync Now" to push all current assets.',
    }
  ];

  steps.forEach((step,i)=>{
    const div=mk('div','guide-step');
    const num=mk('div','guide-step-num');num.textContent=i+1;
    const content2=mk('div','guide-step-content');
    const t=mk('div','guide-step-title');t.textContent=step.title.replace(/^\d+\. /,'');content2.appendChild(t);
    const d=mk('div','guide-step-desc');d.textContent=step.desc;content2.appendChild(d);
    if(step.code){const code=mk('div','guide-code');code.textContent=step.code;content2.appendChild(code);}
    div.append(num,content2);body.appendChild(div);
  });

  // URL input + connect
  const connectBox=mk('div');connectBox.style.cssText='background:var(--bg-elevated);border:1px solid var(--border-default);border-radius:var(--r-lg);padding:16px;margin-top:6px';
  const urlLabel=mk('div');urlLabel.style.cssText='font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;font-family:var(--font-display)';urlLabel.textContent='Apps Script Web App URL';
  const urlInp=mk('input');urlInp.type='url';urlInp.placeholder='https://script.google.com/macros/s/…/exec';urlInp.value=S.sheetsUrl;urlInp.addEventListener('input',e=>S.sheetsUrl=e.target.value);
  const connectBtn=mk('button','btn btn-primary');connectBtn.style.cssText='width:100%;justify-content:center;margin-top:10px';connectBtn.textContent='Connect & Test';
  connectBtn.addEventListener('click',async()=>{
    if(!S.sheetsUrl.includes('script.google.com')){showToast('Enter a valid Google Apps Script URL','var(--red)');return;}
    connectBtn.disabled=true;connectBtn.textContent='Testing connection…';
    try{
      await fetch(S.sheetsUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'TEST',workspace:S.activeWs,timestamp:new Date().toISOString()})});
      S.sheetsConnected=true;showToast('Connected! Syncing assets…','var(--green)');
      await syncAllAssetsToSheets();render();
    }catch(e){showToast('Connection test failed: '+e.message,'var(--red)');connectBtn.disabled=false;connectBtn.textContent='Connect & Test';}
  });
  connectBox.append(urlLabel,urlInp,connectBtn);body.appendChild(connectBox);

  // Copy button for script
  const copyBtn=mk('button','btn btn-ghost btn-sm');copyBtn.style.cssText='margin-top:12px;width:100%;justify-content:center';copyBtn.innerHTML=ICONS.copy+' Copy Script Code';
  copyBtn.addEventListener('click',()=>{
    const scriptText=steps.find(s=>s.code&&s.code.includes('doPost'))?.code||'';
    navigator.clipboard?.writeText(scriptText).then(()=>showToast('Script copied to clipboard!','var(--accent)'));
  });body.appendChild(copyBtn);

  shell.appendChild(body);main.appendChild(shell);
}

  modal.appendChild(confirm);
  const footer=mk('div','modal-footer');
  const cb=mk('button','btn btn-ghost');cb.textContent='Cancel';cb.addEventListener('click',()=>overlay.remove());
  const del=mk('button','btn btn-danger');del.textContent='Delete Campaign';
  del.addEventListener('click',async()=>{
    del.disabled=true;del.textContent='Deleting…';
    try{
      // Soft-Delete assets from this campaign
      const campAssets2=S.assets.filter(a=>a.campaignId===campId);
      await Promise.all(campAssets2.map(a=>updateDoc(doc(db,'workspaces',S.activeWs,'assets',a.id),{softDeleted:true, deletedAt:serverTimestamp()})));
      await deleteDoc(doc(db,'workspaces',S.activeWs,'campaigns',campId));
      showToast('Campaign deleted','var(--red)');overlay.remove();
      if(S.page==='campaign-detail')navigate('campaigns');
    }catch(e){showToast('Error: '+e.message,'var(--red)');del.disabled=false;del.textContent='Delete Campaign';}
  });
  footer.append(cb,del);modal.appendChild(footer);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  overlay.appendChild(modal);addSwipeClose(overlay,modal);document.body.appendChild(overlay);
}

function showUploadModal(existingAssetId=null,currentVN=0,stageId='raw'){
  const asset=existingAssetId?S.assets.find(a=>a.id===existingAssetId):null;
  const overlay=mk('div','modal-overlay');
  const modal=mk('div','modal');
  const title=mk('div','modal-title');title.textContent=existingAssetId?'Upload New Version':'Upload Asset';modal.appendChild(title);
  if(!existingAssetId){
    const f1=mk('div','field');const l1=mk('label');l1.textContent='Asset Title';const i1=mk('input');i1.type='text';i1.id='up-title';i1.placeholder='e.g. March Product Reel';f1.append(l1,i1);modal.appendChild(f1);
    const f2=mk('div','field');const l2=mk('label');l2.textContent='Type';const sel=document.createElement('select');sel.id='up-type';['VIDEO','IMAGE','AUDIO','DOCUMENT'].forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o);});f2.append(l2,sel);modal.appendChild(f2);
    const f3=mk('div','field');const l3=mk('label');l3.textContent='Stage';const sel3=document.createElement('select');sel3.id='up-stage';STAGES.filter(s=>s.uploadable).forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.label;if(s.id===stageId)o.selected=true;sel3.appendChild(o);});f3.append(l3,sel3);modal.appendChild(f3);
  }else{
    const info=mk('div');info.style.cssText='background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:var(--r-sm);padding:9px 11px;font-size:12px;color:var(--text-secondary);margin-bottom:11px';
    info.innerHTML=`Uploading new version for <strong style="color:var(--text-primary)">${asset?.title||'Asset'}</strong> — will become <strong style="color:var(--accent)">v${(currentVN||0)+1}</strong>`;modal.appendChild(info);
  }
  const upZone=mk('div','up-zone');const fileInp=mk('input');fileInp.type='file';fileInp.accept='video/*,image/*,audio/*,application/*';fileInp.style.display='none';
  let selFile=null;
  upZone.innerHTML='<div style="font-size:28px;opacity:.3;margin-bottom:8px">⬆</div><div style="font-size:13px;font-weight:500;color:var(--text-secondary)">Drop file or click to browse</div><div style="font-size:11px;color:var(--text-muted);margin-top:4px">Up to 500MB</div>';
  upZone.addEventListener('click',()=>fileInp.click());
  upZone.addEventListener('dragover',e=>{e.preventDefault();upZone.classList.add('drag');});
  upZone.addEventListener('dragleave',()=>upZone.classList.remove('drag'));
  upZone.addEventListener('drop',e=>{e.preventDefault();upZone.classList.remove('drag');const f=e.dataTransfer.files[0];if(f){selFile=f;upZone.innerHTML=`<div style="font-size:12.5px;font-weight:500;color:var(--text-primary)">${f.name}</div><div style="font-size:11px;color:var(--text-muted);margin-top:3px">${fmtBytes(f.size)}</div>`;}});
  fileInp.addEventListener('change',e=>{const f=e.target.files[0];if(f){selFile=f;upZone.innerHTML=`<div style="font-size:12.5px;font-weight:500;color:var(--text-primary)">${f.name}</div><div style="font-size:11px;color:var(--text-muted);margin-top:3px">${fmtBytes(f.size)}</div>`;}});
  modal.append(upZone,fileInp);
  const progWrap=mk('div','prog-wrap');progWrap.innerHTML='<div class="prog-row"><span id="plbl">Preparing…</span><span id="ppct">0%</span></div><div class="prog-bar-bg"><div class="prog-bar-fill" id="pfill"></div></div><div style="font-size:10.5px;color:var(--text-muted);text-align:center;margin-top:4px">Do not close this window</div>';
  modal.appendChild(progWrap);
  const err=mk('div','err-msg');err.id='up-err';modal.appendChild(err);
  const footer=mk('div','modal-footer');
  const cb=mk('button','btn btn-ghost');cb.textContent='Cancel';cb.addEventListener('click',()=>overlay.remove());
  const ub=mk('button','btn btn-primary');ub.textContent='Upload';
  ub.addEventListener('click',async()=>{
    if(!selFile){const errDiv=qs('#up-err');errDiv.textContent='Select a file first';errDiv.classList.add('show');return;}
    const assetTitle=qs('#up-title')?.value?.trim()||selFile.name.replace(/\.[^/.]+$/,'');
    const assetType=qs('#up-type')?.value||'VIDEO';
    const targetStage=qs('#up-stage')?.value||stageId;
    ub.disabled=true;cb.disabled=true;progWrap.style.display='block';
    const errDiv=qs('#up-err');if(errDiv)errDiv.classList.remove('show');
    try{
      const plbl=qs('#plbl');const ppct=qs('#ppct');const pfill=qs('#pfill');
      if(plbl)plbl.textContent='Uploading to Cloudinary…';
      const result=await uploadToCloudinary(selFile,pct=>{if(ppct)ppct.textContent=pct+'%';if(pfill)pfill.style.width=pct+'%';});
      if(plbl)plbl.textContent='Saving…';if(pfill)pfill.style.width='100%';
      const assetId=existingAssetId||doc(collection(db,'workspaces',S.activeWs,'assets')).id;
      const vRef=doc(collection(db,'workspaces',S.activeWs,'assets',assetId,'versions'));
      await setDoc(vRef,{assetId,versionId:vRef.id,state:'READY',originalFilename:selFile.name,contentType:selFile.type,bytes:selFile.size,cloudinaryUrl:result.secure_url,cloudinaryPublicId:result.public_id,createdByUid:S.authUser.uid,createdAt:serverTimestamp()});
      if(!existingAssetId){
        await setDoc(doc(db,'workspaces',S.activeWs,'assets',assetId),{title:assetTitle,type:assetType,stage:targetStage,platform:'youtube',campaignId:null,cloudinaryUrl:result.secure_url,cloudinaryPublicId:result.public_id,thumbnailUrl:assetType==='IMAGE'?result.secure_url:null,caption:null,duration:result.duration||null,workspace:S.activeWs,assignees:[S.authUser.uid],createdByUid:S.authUser.uid,createdAt:serverTimestamp(),updatedAt:serverTimestamp(),latestVersionId:vRef.id,latestVersionNumber:1,softDeleted:false});
      }else{
        await updateDoc(doc(db,'workspaces',S.activeWs,'assets',assetId),{cloudinaryUrl:result.secure_url,cloudinaryPublicId:result.public_id,thumbnailUrl:assetType==='IMAGE'?result.secure_url:null,duration:result.duration||null,latestVersionId:vRef.id,latestVersionNumber:(currentVN||0)+1,updatedAt:serverTimestamp()});
      }
      const reviewers=S.members.filter(m=>ADMINS.includes(m.role)).map(m=>m.uid);
      pushNotification(reviewers,`${S.member?.displayName} uploaded "${assetTitle}"`,assetId);
      syncToSheets('ASSET_CREATED',{assetId,title:assetTitle,stage:targetStage,platform:'youtube'});
      showToast('Uploaded successfully!','var(--green)');overlay.remove();
    }catch(e){
      console.error('[Upload]',e);const ed=qs('#up-err');if(ed){ed.textContent='Error: '+e.message;ed.classList.add('show');}
      ub.disabled=false;cb.disabled=false;progWrap.style.display='none';
    }
  });
  footer.append(cb,ub);modal.appendChild(footer);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  overlay.appendChild(modal);addSwipeClose(overlay,modal);document.body.appendChild(overlay);
}

function showInviteModal(){
  const overlay=mk('div','modal-overlay');
  const modal=mk('div','modal modal-sm');
  const title=mk('div','modal-title');title.textContent='Invite Team Member';modal.appendChild(title);
  const note=mk('div');note.style.cssText='font-size:12px;color:var(--text-secondary);line-height:1.6;margin-bottom:13px;background:var(--bg-elevated);padding:10px 12px;border-radius:var(--r-sm);border:1px solid var(--border-subtle)';
  note.innerHTML='First create the user in <strong style="color:var(--text-primary)">Firebase Console → Authentication → Add user</strong>. Then enter their details below.';modal.appendChild(note);
  const f1=mk('div','field');const l1=mk('label');l1.textContent='Email';const i1=mk('input');i1.type='email';i1.placeholder='colleague@studio.io';f1.append(l1,i1);modal.appendChild(f1);
  const f2=mk('div','field');const l2=mk('label');l2.textContent='Role';const sel=document.createElement('select');
  Object.entries(ROLE_META).forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=v.label;sel.appendChild(o);});f2.append(l2,sel);modal.appendChild(f2);
  const footer=mk('div','modal-footer');
  const cb=mk('button','btn btn-ghost');cb.textContent='Close';cb.addEventListener('click',()=>overlay.remove());
  const sb=mk('button','btn btn-primary');sb.textContent='Copy Invite';
  sb.addEventListener('click',()=>{navigator.clipboard?.writeText(`FrameBase Pro Invite\nEmail: ${i1.value}\nRole: ${sel.value}\nSign in at the app URL.`).catch(()=>{});showToast('Invite info copied!','var(--accent)');overlay.remove();});
  footer.append(cb,sb);modal.appendChild(footer);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  overlay.appendChild(modal);addSwipeClose(overlay,modal);document.body.appendChild(overlay);
}

render();
</script>
